<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Updates — CORE</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'Swear Text';src:url('https://bellweatherllc.github.io/tools/fonts/SwearText-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Swear Text';src:url('https://bellweatherllc.github.io/tools/fonts/SwearText-MediumItalic.woff2') format('woff2');font-weight:500;font-style:italic;font-display:swap;}

:root{
  --navy:#1f2e3e;
  --gold:#d8b64f;
  --gl:rgba(216,182,79,1);
  --bg:#f5f3ee;
  --surface:#fff;
  --border:#e4dac4;
  --text:#282828;
  --text-sec:#7a7a7a;
  --text-muted:#a3a3a3;
  --green:#019425;
  --red-badge:#ef4444;
  --app-h:44px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'TT Norms Pro',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:12px;}

/* ── Auth overlay — matches pipeline exactly ── */
#authOverlay{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
#authOverlay.hidden{display:none;}
.auth-card{display:flex;flex-direction:column;align-items:center;gap:18px;padding:40px 44px 36px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.40);min-width:320px;text-align:center;}
.auth-logo{height:44px;width:auto;opacity:.90;}
.auth-title{font-family:'Swear Text',serif;font-size:18px;font-weight:700;color:var(--gl);letter-spacing:.02em;}
.auth-subtitle{font-family:'TT Norms Pro',sans-serif;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.35);}
.auth-version{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.20);margin-top:-8px;}
.auth-sign-in{font-family:'TT Norms Pro',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(216,182,79,.18);color:var(--gold);border:1px solid rgba(216,182,79,.40);border-radius:6px;padding:10px 28px;cursor:pointer;transition:background .14s,border-color .14s;margin-top:4px;}
.auth-sign-in:hover{background:rgba(216,182,79,.28);border-color:rgba(216,182,79,.65);}
.auth-status{font-size:11px;color:rgba(255,255,255,.45);min-height:18px;}

/* ── App header — matches pipeline exactly ── */
.app-header{background:var(--navy);padding:7px 18px;display:flex;align-items:center;gap:11px;position:fixed;top:0;left:0;right:0;z-index:400;box-shadow:0 2px 14px rgba(0,0,0,.22);}
.bw-logo{height:22px;width:auto;display:block;}
.hd{width:1px;height:16px;background:rgba(255,255,255,.15);}
.hdr-title{font-family:'Swear Text',serif;font-style:normal;color:rgba(255,255,255,.55);font-size:13px;}
.hsp{flex:1;}
/* Version badge — red, matches pipeline proto-badge */
.proto-badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#ef4444;border:1px solid rgba(239,68,68,.35);padding:2px 7px;border-radius:3px;}
/* Admin control — matches pipeline admin-control exactly */
.admin-control{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.admin-ctrl-label{font-family:'TT Norms Pro',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);user-select:none;}
.admin-switch{cursor:pointer;flex-shrink:0;}
.admin-switch input{display:none;}
.admin-track{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.20);position:relative;display:flex;align-items:center;transition:background .18s,border-color .18s;}
.admin-thumb{position:absolute;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .18s;}
.admin-switch input:checked + .admin-track{background:#c53030;border-color:#c53030;}
.admin-switch input:checked + .admin-track .admin-thumb{transform:translateX(16px);}
body.admin-mode .admin-ctrl-label{color:rgba(255,255,255,.70);}
.admin-only{display:none;}
body.admin-mode .admin-only{display:flex;}
.admin-gear{font-size:18px;line-height:1;color:rgba(255,255,255,.35);cursor:pointer;user-select:none;transition:color .18s,transform .25s;}
body.admin-mode .admin-gear{color:#f87171;transform:rotate(30deg);}
/* Conn indicator */
.conn-wrap{display:flex;align-items:center;gap:6px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#555;transition:background .3s;}
.conn-label{font-size:11px;color:rgba(255,255,255,.45);}

/* ── Main ── */
#mainApp{padding-top:var(--app-h);}
#mainApp.hidden{display:none;}

/* ── Controls bar ── */
.controls-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:var(--app-h);z-index:100;}
.sort-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.sort-btn{background:none;border:1px solid var(--border);border-radius:3px;padding:3px 10px;font-family:'TT Norms Pro',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--text-sec);cursor:pointer;transition:all .12s;}
.sort-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.admin-banner{display:none;align-items:center;gap:5px;background:rgba(197,48,48,.08);border:1px solid rgba(197,48,48,.25);border-radius:3px;padding:3px 9px;}
.admin-banner.visible{display:flex;}
.admin-banner span{font-size:10px;font-weight:700;letter-spacing:.05em;color:#c53030;}
.proj-count{margin-left:auto;font-size:10px;color:var(--text-muted);}

/* ── Projects area ── */
.projects-area{padding:14px 18px;display:flex;flex-direction:column;gap:14px;}

/* ── PM group ── */
.pm-group{padding-bottom:20px;}
.pm-group-hdr{display:flex;align-items:center;gap:10px;padding:8px 0 10px;margin-bottom:8px;border-bottom:2px solid var(--border);}
.pm-group-name{font-size:15px;font-weight:700;color:var(--navy);letter-spacing:.01em;transition:color .12s;}
.pm-group-count{font-size:10px;color:var(--text-muted);}
.pm-group-cards{display:flex;flex-direction:column;gap:8px;padding-left:16px;overflow:hidden;}

/* ── Project card — softer ── */

/* ── Project card — softer ── */
.proj-card{background:#fff;border:1px solid rgba(228,218,196,.60);border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(31,46,62,.06);}
.proj-card.has-unreviewed{border-color:rgba(216,182,79,.50);box-shadow:0 0 0 1px rgba(216,182,79,.30),0 1px 4px rgba(31,46,62,.06);}
.proj-card-hdr{padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .1s;}
.proj-card-hdr:hover{background:rgba(31,46,62,.025);}
.proj-chev{font-size:8px;color:var(--text-muted);transition:transform .18s;flex-shrink:0;}
.proj-card.open .proj-chev{transform:rotate(90deg);}
.pip{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.proj-card-name{font-size:12px;font-weight:600;color:var(--navy);flex:1;line-height:1.3;}
.proj-hdr-meta{display:flex;align-items:center;gap:16px;flex-shrink:0;}
.meta-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.meta-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.meta-val{font-size:12px;font-weight:700;color:var(--text);}
.meta-val.up{color:var(--green);}
.meta-val.down{color:#a30a0a;}

.proj-card-body{border-top:1px solid var(--border);display:none;}
.proj-card.open .proj-card-body{display:block;}

/* Team row */
.team-row{padding:6px 14px;background:rgba(31,46,62,.03);border-bottom:1px solid var(--border);display:flex;gap:18px;flex-wrap:wrap;}
.team-member{display:flex;flex-direction:column;gap:1px;}
.team-role{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.team-name{font-size:11px;font-weight:500;color:var(--navy);}

/* Fields */
.proj-fields{padding:11px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;border-bottom:1px solid var(--border);cursor:default;}
.field-blk{display:flex;flex-direction:column;gap:3px;}
.field-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.field-val{font-size:14px;font-weight:700;color:var(--navy);line-height:1.1;}
.field-val.muted{color:var(--text-muted);font-size:12px;}
.field-val.up{color:var(--green);}
.field-val.down{color:#a30a0a;}
.field-sub{font-size:10px;color:var(--text-muted);}

/* Edit form */
.proj-edit-form{display:none;padding:11px 14px;background:rgba(197,48,48,.03);border-bottom:1px solid rgba(197,48,48,.15);}
.proj-edit-form.visible{display:block;}
.edit-form-hdr{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:10px;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.edit-field{display:flex;flex-direction:column;gap:3px;}
.edit-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);}
.edit-input{border:1.5px solid rgba(197,48,48,.50);border-radius:3px;padding:6px 9px;font-family:'TT Norms Pro',sans-serif;font-size:12px;color:var(--text);background:#fff;width:100%;transition:border-color .12s;}
.edit-input:focus{outline:none;border-color:#c53030;box-shadow:0 0 0 2px rgba(197,48,48,.12);}
.edit-note-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.edit-note{width:100%;border:1.5px solid rgba(197,48,48,.50);border-radius:3px;padding:6px 9px;font-family:'TT Norms Pro',sans-serif;font-size:12px;color:var(--text);background:#fff;resize:vertical;min-height:48px;transition:border-color .12s;}
.edit-note:focus{outline:none;border-color:#c53030;box-shadow:0 0 0 2px rgba(197,48,48,.12);}
.edit-actions{display:flex;align-items:center;gap:8px;}
.save-btn{font-family:'TT Norms Pro',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--navy);color:#fff;border:none;border-radius:3px;padding:7px 18px;cursor:pointer;transition:background .12s;}
.save-btn:hover{background:#2d4258;}
.save-btn:disabled{opacity:.4;cursor:default;}
.save-feedback{font-size:10px;color:var(--text-muted);}

/* Readonly nudge */
#readonlyNudge{position:fixed;background:var(--navy);color:rgba(255,255,255,.88);padding:8px 13px 8px 11px;border-radius:4px;font-size:11px;z-index:500;box-shadow:0 4px 14px rgba(0,0,0,.25);pointer-events:none;display:none;white-space:nowrap;display:none;align-items:center;gap:7px;}
#readonlyNudge.show{display:flex;}
#readonlyNudge .nudge-arrow{font-size:14px;animation:nudgeBounce .6s ease-in-out infinite alternate;}
@keyframes nudgeBounce{from{transform:translateY(0)}to{transform:translateY(-3px)}}

/* Log */
.proj-log{padding:10px 14px;}
.log-hdr{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;}
.log-empty{font-size:11px;color:var(--text-muted);font-style:italic;}
.log-entry{display:grid;grid-template-columns:120px 1fr;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.log-entry:last-child{border-bottom:none;}
.log-meta{display:flex;flex-direction:column;gap:1px;}
.log-who{font-size:11px;font-weight:600;color:var(--navy);}
.log-when{font-size:9px;color:var(--text-muted);}
.log-body{display:flex;flex-direction:column;gap:2px;}
.log-delta{font-size:12px;font-weight:700;}
.log-delta.up{color:var(--green);}
.log-delta.down{color:#a30a0a;}
.log-end{font-size:11px;color:var(--text-sec);}
.log-note{font-size:11px;color:var(--text);font-style:italic;}
.log-actions{display:flex;gap:8px;margin-top:4px;}
.log-action-btn{background:none;border:none;font-size:10px;font-weight:600;color:var(--text-muted);cursor:pointer;padding:0;letter-spacing:.03em;text-decoration:underline;text-underline-offset:2px;}
.log-action-btn:hover{color:var(--navy);}
.log-action-btn.del:hover{color:#a30a0a;}
.log-inline-edit{margin-top:6px;display:flex;flex-direction:column;gap:6px;}
.log-inline-input{border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:'TT Norms Pro',sans-serif;font-size:12px;width:100%;transition:border-color .12s;}
.log-inline-input:focus{outline:none;border-color:var(--gold);}
.log-inline-actions{display:flex;gap:8px;align-items:center;}
.log-inline-save{font-family:'TT Norms Pro',sans-serif;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--navy);color:#fff;border:none;border-radius:3px;padding:5px 14px;cursor:pointer;}
.log-inline-cancel{font-size:11px;color:var(--text-muted);cursor:pointer;background:none;border:none;}

/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:8px 16px;border-radius:4px;font-size:11px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .22s;}
.toast.show{opacity:1;}
.state-msg{padding:40px 18px;color:var(--text-sec);font-size:12px;}
.state-msg strong{display:block;font-size:14px;color:var(--navy);margin-bottom:4px;}
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="authOverlay">
  <div class="auth-card">
    <img class="auth-logo" src="https://bellweatherllc.github.io/tools/logos/Monogram-Linen.svg" alt="Bellweather">
    <div>
      <div class="auth-title">Project Updates</div>
      <div class="auth-subtitle">Bellweather Design Build</div>
    </div>
    <div class="auth-version" id="authVersionBadge">v30</div>
    <button class="auth-sign-in" onclick="doSignIn()">Sign in with Microsoft</button>
    <div class="auth-status" id="authStatus"></div>
  </div>
</div>

<!-- Header — matches pipeline exactly -->
<div class="app-header">
  <img class="bw-logo" src="https://bellweatherllc.github.io/tools/logos/Monogram-Linen.svg" alt="Bellweather">
  <div class="hd"></div>
  <div class="hdr-title">Project Updates</div>
  <div class="admin-control" id="adminControl" style="display:none">
    <span class="admin-ctrl-label">Admin</span>
    <label class="admin-switch" title="Toggle admin mode">
      <input type="checkbox" id="adminCheckbox" onchange="toggleAdminMode()">
      <span class="admin-track"><span class="admin-thumb"></span></span>
    </label>
    <span class="admin-gear" id="adminGear" onclick="toggleAdminMode()">⚙</span>
  </div>
  <div class="proto-badge" id="versionBadge">v30</div>
  <div class="hsp"></div>
  <div class="conn-wrap">
    <div class="conn-dot" id="connDot"></div>
    <div class="conn-label" id="connLabel">Connecting…</div>
  </div>
</div>

<!-- Main -->
<div id="mainApp" class="hidden">
  <div class="controls-bar">
    <div class="admin-banner" id="adminBanner"><span>⚡ Admin Mode Active</span></div>
    <span class="proj-count" id="projCount"></span>
  </div>
  <div class="projects-area" id="projectsArea">
    <div class="state-msg" id="loadingMsg"><strong>Loading…</strong>Fetching construction projects.</div>
  </div>
</div>

<div id="readonlyNudge"><span class="nudge-arrow">↑</span>Enable Admin Mode to make changes</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

const MSAL_CONFIG={auth:{clientId:'84b37f0e-b149-4089-9bdc-fc654715db23',authority:'https://login.microsoftonline.com/ff0e3f46-615a-4a22-8a80-4bb83d627785',redirectUri:window.location.origin+window.location.pathname},cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}};
const SCOPES=['https://graph.microsoft.com/Sites.ReadWrite.All'];
const SP='https://graph.microsoft.com/v1.0/sites/bellweather.sharepoint.com:/sites/BWCore:/lists';
const EPOCH_MS=Date.UTC(2025,0,5);

let msalApp=null,accessToken='',currentUser='',isAdmin=false,adminModeOn=false;
let projects=[],reviews=[];
// Per-group sort state: pmKey → 'alpha'|'end'
const groupSort={};

// ── Auth ──────────────────────────────────────────────────────────────────
async function initMsal(){
  msalApp=new msal.PublicClientApplication(MSAL_CONFIG);
  try{const r=await msalApp.handleRedirectPromise();if(r&&r.accessToken){accessToken=r.accessToken;onAuthenticated(r.account);return;}}catch(e){console.warn('[auth]',e.message);}
  const accs=msalApp.getAllAccounts();
  if(accs.length){
    try{const r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accs[0]});accessToken=r.accessToken;onAuthenticated(accs[0]);}
    catch(e){document.getElementById('authOverlay').classList.remove('hidden');}
  } else {
    document.getElementById('authOverlay').classList.remove('hidden');
  }
}
function doSignIn(){msalApp.loginRedirect({scopes:SCOPES});}
async function onAuthenticated(account){
  currentUser=account.name||account.username||'Unknown';
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('connDot').style.background='#22c55e';
  document.getElementById('connLabel').textContent=currentUser;
  await loadAll();
  _startRefresh();
}

// ── Graph ─────────────────────────────────────────────────────────────────
async function graphGet(url,extra={}){
  const r=await fetch(url,{headers:{Authorization:'Bearer '+accessToken,...extra}});
  if(!r.ok) throw new Error('Graph '+r.status+' '+url.split('?')[0].split('/').pop());
  return r.json();
}
async function graphPatch(url,body){
  const r=await fetch(url,{method:'PATCH',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('PATCH '+r.status+': '+(await r.text()).slice(0,100));
  return r.json();
}
async function graphDelete(url){
  const r=await fetch(url,{method:'DELETE',headers:{Authorization:'Bearer '+accessToken}});
  if(!r.ok&&r.status!==204) throw new Error('DELETE '+r.status);
}
async function graphPost(url,body){
  const r=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('POST '+r.status+': '+(await r.text()).slice(0,100));
  return r.json();
}

// ── Load ──────────────────────────────────────────────────────────────────
function buildProjectsList(items){
  return items
    .filter(item=>{
      const f=item.fields||{};
      const stage=(f.PipelineStage||'').toLowerCase().replace(/[-\s]/g,'');
      if(!stage||stage==='archived'||stage==='archive'||stage==='cancelled'||stage==='cancel'||stage==='lost') return false;
      let gantt={}; try{gantt=JSON.parse(f.GanttData||'{}');}catch(e){}
      const ganttStatus=(gantt.status||'').toLowerCase();
      if(ganttStatus==='archived'||ganttStatus==='archive'||ganttStatus==='cancelled'||ganttStatus==='cancel'||ganttStatus==='lost') return false;
      const hasPM=!!(f.PMName||(gantt.productionPM&&window._tmById&&window._tmById[gantt.productionPM]));
      return hasPM;
    })
    .map(item=>{
      const f=item.fields||{};
      let gantt={};try{gantt=JSON.parse(f.GanttData||'{}');}catch(e){}
      const phases=(gantt.productionLane?.phases)||[];
      const last=phases[phases.length-1];
      let endDate=null;
      if(last){
        const wk=(last.startWeek||0)+(last.durWeeks||0);
        const ms=EPOCH_MS+wk*7*24*3600*1000;
        const d=new Date(ms);
        endDate=d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
      }
      const resolveName=raw=>{
        if(!raw) return '';
        if(!raw.includes(' ')&&window._tmFirstToFull) return window._tmFirstToFull[raw.toLowerCase()]||raw;
        return raw;
      };
      return{
        spItemId:item.id,id:item.id,
        displayName:f.ProjectName||f.ClientName||f.Title||item.id,
        estimatedValue:f.EstimatedProjectValue||'',
        designer:resolveName(f.DesignerName||(gantt.designer&&window._tmById?window._tmById[gantt.designer]:'')||''),
        secondaryDesigner:resolveName(f.SecondaryDesigner||(gantt.secondaryDesigner&&window._tmById?window._tmById[gantt.secondaryDesigner]:'')||''),
        pm:resolveName(f.PMName||(gantt.productionPM&&window._tmById?window._tmById[gantt.productionPM]:'')||''),
        lc1:f.LogisticsCoordinator1||'',lc2:f.LogisticsCoordinator2||'',
        sales:f.SalesPerson||'',endDate,gantt,
      };
    });
}

async function loadAll(){
  try{
    const td=await graphGet(SP+'/CORE_TeamMembers/items?$expand=fields&$select=id,fields&$top=200');
    const teamMembers=td.value||[];
    const me=teamMembers.find(m=>{
      const n=(m.fields.EmployeeName||m.fields.Title||'').toLowerCase();
      const u=currentUser.toLowerCase();
      return u.includes(n.split(' ')[0])||n.includes(u.split(' ')[0]);
    });
    isAdmin=!!(me&&(me.fields.ProjectUpdatesRole||'').trim());
    if(isAdmin) document.getElementById('adminControl').style.display='flex';
    // Build id→name map for resolving GanttData person IDs
    window._tmById={};
    window._tmFirstToFull={};  // normalize first-name-only → full name
    teamMembers.forEach(m=>{
      const f=m.fields||{};
      const name=f.EmployeeName||f.Title||'';
      if(!name) return;
      // Index by all possible key formats the pipeline might use
      if(m.id) window._tmById[m.id]=name;
      if(m.id) window._tmById['sp-person-'+m.id]=name;
      if(f.id) window._tmById[f.id]=name;
      if(f.id) window._tmById['sp-person-'+f.id]=name;
      // First name → full name map for normalizing PMName stored as first name only
      const firstName=name.split(' ')[0];
      window._tmFirstToFull[firstName.toLowerCase()]=name;
    });

    const pd=await graphGet(SP+'/CORE_Projects/items?$expand=fields&$select=id,fields&$top=500');
    projects=buildProjectsList(pd.value||[]);

    try{ await loadReviews(); }
    catch(e){ console.warn('[loadReviews] non-fatal:',e.message); reviews=[]; }
    renderAll();
  }catch(e){
    console.error('[load]',e);
    const msg=document.getElementById('loadingMsg');
    if(msg) msg.innerHTML='<strong>Error loading data</strong><br>'+e.message;
  }
}

async function loadReviews(){
  try{
    const rd=await graphGet(SP+'/CORE_ProjectReviews/items?$expand=fields&$select=id,fields&$top=500',
      {'Prefer':'HonorNonIndexedQueriesWarningMayFailRandomly'});
    reviews=(rd.value||[]).map(item=>({spItemId:item.id,_fieldsId:item.fields?.id,...item.fields}));
  }catch(e){
    console.warn('[loadReviews]',e.message);
    // List may not exist yet — continue with empty reviews
    reviews=[];
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function parseBudget(s){return parseInt(String(s||'').replace(/[^0-9]/g,''))||0;}
function fmtCurrency(n){
  if(!n&&n!==0) return '—';
  const abs=Math.abs(n);
  const str='$'+abs.toLocaleString('en-US');
  return n<0?'−'+str:str;
}
function fmtDate(iso){
  if(!iso) return '—';
  const[y,m,d]=iso.slice(0,10).split('-').map(Number);
  return new Date(Date.UTC(y,m-1,d)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
}
function fmtDT(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function projRevs(id){return reviews.filter(r=>(r.ProjectID||r.ProjectId)===id).sort((a,b)=>new Date(b.EntryDate||0)-new Date(a.EntryDate||0));}
function cumDelta(id){return projRevs(id).reduce((s,r)=>s+(parseFloat(r.CostDelta)||0),0);}
function latestEnd(proj){return proj.endDate;}
function hasUnrev(id){return reviews.some(r=>r.ProjectId===id&&!r.Reviewed);}

// ── Render — grouped by PM ─────────────────────────────────────────────────
function renderAll(){
  const area=document.getElementById('projectsArea');
  const _lm=document.getElementById('loadingMsg');if(_lm)_lm.style.display='none';
  document.getElementById('projCount').textContent=projects.length+' active project'+(projects.length!==1?'s':'');

  const open=new Set([...area.querySelectorAll('.proj-card.open')].map(el=>el.dataset.pid));
  area.innerHTML='';

  if(!projects.length){area.innerHTML='<div class="state-msg"><strong>No projects in construction</strong>CA-signed projects appear here.</div>';return;}

  // Group by PM
  const groups={};
  projects.forEach(p=>{
    const key=p.pm||'Unassigned';
    if(!groups[key]) groups[key]=[];
    groups[key].push(p);
  });

  // Sort group keys alpha, Unassigned last
  const keys=Object.keys(groups).sort((a,b)=>{
    if(a==='Unassigned') return 1;if(b==='Unassigned') return -1;
    return a.localeCompare(b);
  });

  // Determine which PM groups should be open:
  // current user's group always open; previously-open groups stay open; others collapsed
  keys.forEach(pm=>{
    const grpEl=document.createElement('div');
    grpEl.className='pm-group';
    grpEl.dataset.pmKey=pm;

    const ghdr=document.createElement('div');
    ghdr.className='pm-group-hdr';
    ghdr.innerHTML=`<span class="pm-group-name">${pm}</span><span class="pm-group-count">${groups[pm].length} project${groups[pm].length!==1?'s':''}</span>`;
    grpEl.appendChild(ghdr);

    const cards=document.createElement('div');
    cards.className='pm-group-cards';

    sortGroup(groups[pm],'alpha').forEach(proj=>{
      buildCard(proj,cards,open.has(proj.id));
    });

    grpEl.appendChild(cards);
    area.appendChild(grpEl);
  });
}

function sortGroup(list,mode){
  const c=[...list];
  if(mode==='alpha') c.sort((a,b)=>a.displayName.localeCompare(b.displayName));
  else c.sort((a,b)=>{
    const ea=latestEnd(a),eb=latestEnd(b);
    if(!ea&&!eb) return 0;if(!ea) return 1;if(!eb) return -1;
    return ea.localeCompare(eb);
  });
  return c;
}

function setGroupSort(pm,mode,btn){
  groupSort[pm]=mode;
  const grp=btn.closest('.pm-group');
  grp.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cards=grp.querySelector('.pm-group-cards');
  const open=new Set([...cards.querySelectorAll('.proj-card.open')].map(el=>el.dataset.pid));
  cards.innerHTML='';
  const list=projects.filter(p=>(p.pm||'Unassigned')===pm);
  sortGroup(list,mode).forEach(proj=>buildCard(proj,cards,open.has(proj.id)));
}

function buildCard(proj,container,startOpen){
  const delta=cumDelta(proj.id);
  const base=parseBudget(proj.estimatedValue);
  const current=base+delta;
  const end=latestEnd(proj);
  const revs=projRevs(proj.id);
  const unrev=hasUnrev(proj.id);

  const card=document.createElement('div');
  card.className='proj-card'+(startOpen?' open':'')+(unrev?' has-unreviewed':'');
  card.dataset.pid=proj.id;

  // Header
  const hdr=document.createElement('div');
  hdr.className='proj-card-hdr';
  hdr.innerHTML=`
    <span class="proj-chev">▶</span>
    ${unrev?'<div class="pip" title="Unreviewed changes"></div>':''}
    <div class="proj-card-name">${proj.displayName}</div>
    <div class="proj-hdr-meta">
      <div class="meta-item">
        <span class="meta-lbl">Est. Value</span>
        <span class="meta-val ${delta>0?'up':delta<0?'down':''}">${fmtCurrency(current)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-lbl">End Date</span>
        <span class="meta-val">${fmtDate(end)}</span>
      </div>
    </div>`;
  hdr.addEventListener('click',()=>card.classList.toggle('open'));
  card.appendChild(hdr);

  // Body
  const body=document.createElement('div');
  body.className='proj-card-body';

  // Team
  const teamItems=[
    proj.sales&&{role:'Sales',name:proj.sales},
    proj.designer&&{role:'Design',name:proj.designer+(proj.secondaryDesigner?' · '+proj.secondaryDesigner:'')},
    proj.pm&&{role:'PM',name:proj.pm},
    (proj.lc1||proj.lc2)&&{role:'Logistics',name:[proj.lc1,proj.lc2].filter(Boolean).join(' · ')},
  ].filter(Boolean);
  if(teamItems.length){
    const tr=document.createElement('div');tr.className='team-row';
    teamItems.forEach(({role,name})=>tr.innerHTML+=`<div class="team-member"><span class="team-role">${role}</span><span class="team-name">${name}</span></div>`);
    body.appendChild(tr);
  }

  // Fields
  const flds=document.createElement('div');
  flds.className='proj-fields';
  flds.innerHTML=`
    <div class="field-blk">
      <div class="field-lbl">Original Value</div>
      <div class="field-val">${fmtCurrency(base)}</div>
      <div class="field-sub">${delta?'Adjusted '+(delta>0?'+':'')+fmtCurrency(Math.abs(delta)):'No adjustments'}</div>
    </div>
    <div class="field-blk">
      <div class="field-lbl">Current Value</div>
      <div class="field-val ${delta>0?'up':delta<0?'down':''}">${fmtCurrency(current)}</div>
      <div class="field-sub">${revs.filter(r=>r.CostDelta).length} adjustment${revs.filter(r=>r.CostDelta).length!==1?'s':''}</div>
    </div>
    <div class="field-blk">
      <div class="field-lbl">End Date</div>
      <div class="field-val ${!end?'muted':''}">${fmtDate(end)}</div>
      <div class="field-sub">From Gantt</div>
    </div>`;
  flds.addEventListener('click',(e)=>{if(!adminModeOn&&!e.target.closest('.proj-edit-form')) showNudge(e);});
  body.appendChild(flds);

  // Edit form
  const form=document.createElement('div');
  form.className='proj-edit-form'+(adminModeOn?' visible':'');
  form.id='form_'+proj.id;
  form.innerHTML=`
    <div class="edit-form-hdr">Log a Change</div>
    <div class="edit-grid">
      <div class="edit-field">
        <label class="edit-lbl">Cost Change ($)</label>
        <input class="edit-input" type="number" id="delta_${proj.id}" placeholder="+50000 or −25000" step="1">
      </div>
      <div class="edit-field">
        <label class="edit-lbl">New End Date</label>
        <input class="edit-input" type="date" id="end_${proj.id}" value="${end||''}">
      </div>
    </div>
    <div class="edit-note-field">
      <label class="edit-lbl">Note (optional)</label>
      <textarea class="edit-note" id="note_${proj.id}" placeholder="Reason for change…" maxlength="500" autocomplete="off" spellcheck="false"></textarea>
    </div>
    <div class="edit-actions">
      <button class="save-btn" onclick="submitChange('${proj.id}')">Save Change</button>
      <span class="save-feedback" id="fb_${proj.id}"></span>
    </div>`;
  body.appendChild(form);

  // Log
  const log=document.createElement('div');
  log.className='proj-log';
  log.innerHTML='<div class="log-hdr">Change History</div>';
  if(!revs.length){
    log.innerHTML+='<div class="log-empty">No changes recorded yet.</div>';
  } else {
    revs.forEach(r=>{
      const dv=parseFloat(r.CostDelta)||0;
      let content='';
      if(dv) content+=`<div class="log-delta ${dv>0?'up':'down'}">${dv>0?'+':''}${fmtCurrency(Math.abs(dv))} ${dv>0?'increase':'decrease'}</div>`;
      if(r.NewEndDate) content+=`<div class="log-end">End date → ${fmtDate(r.NewEndDate.slice(0,10))}</div>`;
      if(r.Notes) content+=`<div class="log-note">${r.Notes}</div>`;
      const entry=document.createElement('div');entry.className='log-entry';entry.dataset.revId=r.spItemId||'';
      const isPending=(r.spItemId||'').startsWith('pending-');
      const actionsHtml=''; // built via DOM below
      entry.innerHTML=`<div class="log-meta"><div class="log-who">${r.ReviewerName||'—'}</div><div class="log-when">${fmtDT(r.EntryDate)}</div></div><div class="log-body">${content||'<span style="color:var(--text-muted);font-size:10px">Note only</span>'}</div>`;
      // Admin actions — built via DOM, gated by adminModeOn at click time
      if(!isPending){
        const actDiv=document.createElement('div');
        actDiv.className='log-actions';
        actDiv.style.display=adminModeOn?'flex':'none';
        actDiv.dataset.adminAction='1';
        const editBtn=document.createElement('button');
        editBtn.className='log-action-btn';editBtn.textContent='Edit';
        editBtn.addEventListener('click',()=>{ if(!adminModeOn){showNudge();return;} editReview(r.spItemId,proj.id,entry); });
        const delBtn2=document.createElement('button');
        delBtn2.className='log-action-btn del';delBtn2.textContent='Delete';
        delBtn2.addEventListener('click',()=>{ if(!adminModeOn){showNudge();return;} deleteReview(r.spItemId,proj.id); });
        actDiv.appendChild(editBtn);actDiv.appendChild(delBtn2);
        entry.querySelector('.log-body').appendChild(actDiv);
      }
      log.appendChild(entry);
    });
  }
  body.appendChild(log);
  card.appendChild(body);
  container.appendChild(card);
}

// ── Admin ─────────────────────────────────────────────────────────────────
function toggleAdminMode(){
  adminModeOn=document.getElementById('adminCheckbox').checked;
  document.body.classList.toggle('admin-mode',adminModeOn);
  document.getElementById('adminBanner').classList.toggle('visible',adminModeOn);
  document.querySelectorAll('.proj-edit-form').forEach(f=>f.classList.toggle('visible',adminModeOn));
  // Show/hide log action buttons immediately
  document.querySelectorAll('[data-admin-action]').forEach(el=>el.style.display=adminModeOn?'flex':'none');
}
function showNudge(e){
  const n=document.getElementById('readonlyNudge');
  if(!n) return;
  if(e){
    // Position near cursor, nudged up so it doesn't obscure the click point
    const x=e.clientX,y=e.clientY;
    // Keep within viewport
    const W=window.innerWidth;
    const nW=220; // approx width
    n.style.left=Math.min(x+12,W-nW-8)+'px';
    n.style.top=(y-44)+'px';
  }
  n.classList.add('show');
  clearTimeout(n._hideTimer);
  n._hideTimer=setTimeout(()=>n.classList.remove('show'),2400);
}

// ── Submit ────────────────────────────────────────────────────────────────
async function submitChange(projId){
  const proj=projects.find(p=>p.id===projId);if(!proj) return;
  // Capture all values and refs BEFORE any async work — DOM may be rebuilt mid-flight
  const dEl=document.getElementById('delta_'+projId);
  const eEl=document.getElementById('end_'+projId);
  const nEl=document.getElementById('note_'+projId);
  const fb=document.getElementById('fb_'+projId);
  const formEl=document.getElementById('form_'+projId);
  const btn=formEl?formEl.querySelector('.save-btn'):null;
  const delta=parseFloat(dEl?.value)||0,note=(nEl?.value||'').trim();
  // Only treat end date as a change if it differs from the current end date
  const currentEnd=latestEnd(proj);
  const rawEnd=eEl?.value||'';
  const newEnd=(rawEnd&&rawEnd!==currentEnd)?rawEnd:'';
  if(!delta&&!newEnd&&!note){if(fb)fb.textContent='Enter a change, date, or note.';return;}
  if(btn) btn.disabled=true;
  if(fb) fb.textContent='Saving…';
  let type='Note';if(delta&&newEnd)type='Combined';else if(delta)type='Cost';else if(newEnd)type='EndDate';
  try{
    await graphPost(SP+'/CORE_ProjectReviews/items',{fields:{
      ProjectID:projId,ProjectName:proj.displayName,ReviewerName:currentUser,
      EntryDate:new Date().toISOString(),CostDelta:delta||null,NewEndDate:newEnd||null,
      Notes:note||null,EntryType:type,Reviewed:false,
    }});
    if(delta){
      // Round to nearest dollar — cents are meaningless for construction budgets
      const newTotal=parseBudget(proj.estimatedValue)+cumDelta(proj.id)+delta;
      await graphPatch(SP+'/CORE_Projects/items/'+proj.spItemId+'/fields',{EstimatedProjectValue:'$'+newTotal.toLocaleString()});
      proj.estimatedValue='$'+newTotal.toLocaleString();
    }
    if(newEnd&&newEnd!==currentEnd){
      const newEndMs=Date.UTC(...newEnd.split('-').map((v,i)=>i===1?+v-1:+v));
      const newEndWk=Math.round((newEndMs-EPOCH_MS)/(7*24*3600*1000));
      const gantt=JSON.parse(JSON.stringify(proj.gantt));
      const phases=gantt.productionLane?.phases||[];
      if(!proj.spItemId){
        if(fb) fb.textContent='Error: project has no SharePoint ID — cannot save end date.';
        throw new Error('Missing spItemId for '+proj.displayName);
      }
      if(!phases.length){
        if(fb) fb.textContent='Error: no production phases found — Gantt may not be set up for this project.';
        throw new Error('No production phases for '+proj.displayName);
      }
      const last=phases[phases.length-1];
      last.durWeeks=Math.max(1,newEndWk-(last.startWeek||0));
      if(fb) fb.textContent='Saving end date…';
      await graphPatch(SP+'/CORE_Projects/items/'+proj.spItemId+'/fields',{GanttData:JSON.stringify(gantt)});
      proj.gantt=gantt;proj.endDate=newEnd;
    }
    // Optimistically add entry locally so it appears immediately
    reviews.unshift({
      spItemId:'pending-'+Date.now(),
      ProjectID:projId,ProjectName:proj.displayName,ReviewerName:currentUser,
      EntryDate:new Date().toISOString(),CostDelta:delta||null,NewEndDate:newEnd||null,
      Notes:note||null,EntryType:type,Reviewed:false,
    });
    // Clear inputs BEFORE renderAll destroys them
    if(document.getElementById('delta_'+projId)) document.getElementById('delta_'+projId).value='';
    if(document.getElementById('note_'+projId)) document.getElementById('note_'+projId).value='';
    if(btn&&btn.isConnected) btn.disabled=false;
    const wasOpen=document.querySelector('.proj-card[data-pid="'+projId+'"]')?.classList.contains('open');
    showToast('Change saved ✓');
    renderAll();
    if(wasOpen){const c=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c)c.classList.add('open');}
    // Background refresh to replace optimistic entry with real SP item
    loadReviews().then(()=>{ renderAll(); if(wasOpen){const c2=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c2)c2.classList.add('open');} });
  }catch(e){console.error('[submit]',e);if(fb)fb.textContent='Error: '+e.message;if(btn)btn.disabled=false;}
}

function editReview(revId, projId, entryEl){
  const entry=entryEl||document.querySelector('[data-rev-id="'+revId+'"]');
  if(!entry) return;
  const r=reviews.find(rv=>rv.spItemId===revId);
  if(!r) return;
  // Replace log-body content with inline edit form
  const body=entry.querySelector('.log-body');
  const origContent=body.innerHTML;
  const editWrap=document.createElement('div');
  editWrap.className='log-inline-edit';
  editWrap.dataset.editRevId=revId;
  editWrap.dataset.editProjId=projId;
  const inp=document.createElement('input');
  inp.className='log-inline-input';inp.type='text';
  inp.value=r.Notes||'';inp.placeholder='Note…';
  inp.dataset.editInput='1';
  const actRow=document.createElement('div');actRow.className='log-inline-actions';
  const saveBtn=document.createElement('button');saveBtn.className='log-inline-save';saveBtn.textContent='Save';
  saveBtn.addEventListener('click',()=>saveEditReview(revId,projId,inp,saveBtn,fbSpan));
  const cancelBtn=document.createElement('button');cancelBtn.className='log-inline-cancel';cancelBtn.textContent='Cancel';
  cancelBtn.addEventListener('click',()=>cancelEditReview(revId,projId));
  const fbSpan=document.createElement('span');fbSpan.style.cssText='font-size:10px;color:var(--text-muted)';
  actRow.appendChild(saveBtn);actRow.appendChild(cancelBtn);actRow.appendChild(fbSpan);
  editWrap.appendChild(inp);editWrap.appendChild(actRow);
  body.innerHTML='';
  body.appendChild(editWrap);
}

function cancelEditReview(revId, projId){
  const wasOpen=document.querySelector('.proj-card[data-pid="'+projId+'"]')?.classList.contains('open');
  renderAll();
  if(wasOpen){const c=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c)c.classList.add('open');}
}

async function saveEditReview(revId, projId, noteEl, saveBtn, fb){
  const note=(noteEl?.value||'').trim();
  if(fb) fb.textContent='Saving…';
  if(saveBtn) saveBtn.disabled=true;
  try{
    await graphPatch(SP+'/CORE_ProjectReviews/items/'+revId,{fields:{Notes:note||null}});
    // Note: revId is item.id from Graph response — correct for items/{id} endpoint
    const r=reviews.find(rv=>rv.spItemId===revId);
    if(r) r.Notes=note||null;
    const wasOpen=document.querySelector('.proj-card[data-pid="'+projId+'"]')?.classList.contains('open');
    renderAll();
    if(wasOpen){const c=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c)c.classList.add('open');}
    showToast('Note updated.');
  }catch(e){
    if(fb) fb.textContent='Error: '+e.message;
    if(saveBtn) saveBtn.disabled=false;
  }
}

async function deleteReview(revId, projId){
  // Guard: don't try to delete optimistic/pending entries
  if((revId||'').startsWith('pending-')){showToast('Entry not yet saved — refresh and try again.');return;}
  // Inline confirm instead of browser alert
  const entry=document.querySelector(`.log-entry[data-rev-id="${revId}"]`);
  if(entry&&!entry.dataset.confirmingDelete){
    entry.dataset.confirmingDelete='1';
    const body=entry.querySelector('.log-body');
    const origHtml=body.innerHTML;
    // Build inline confirm using DOM to avoid quoting issues with revId/projId
    const conf=document.createElement('div');
    conf.className='log-inline-confirm';
    conf.style.cssText='margin-top:6px;display:flex;align-items:center;gap:8px;';
    conf.innerHTML='<span style="font-size:11px;color:#a30a0a;font-weight:600;">Delete this entry?</span>';
    const delBtn=document.createElement('button');
    delBtn.className='log-inline-save';delBtn.style.background='#a30a0a';delBtn.textContent='Delete';
    delBtn.addEventListener('click',()=>confirmDeleteReview(revId,projId));
    const cancelBtn2=document.createElement('button');
    cancelBtn2.className='log-inline-cancel';cancelBtn2.textContent='Cancel';
    cancelBtn2.addEventListener('click',()=>cancelDeleteReview(revId));
    conf.appendChild(delBtn);conf.appendChild(cancelBtn2);
    body.appendChild(conf);
    return;
  }
}
function cancelDeleteReview(revId){
  const entry=document.querySelector('[data-rev-id="'+revId+'"]');
  if(entry){delete entry.dataset.confirmingDelete;const conf=entry.querySelector('.log-inline-confirm');if(conf)conf.remove();}
}
async function confirmDeleteReview(revId, projId){
  let deleted=false;
  try{
    await graphDelete(SP+'/CORE_ProjectReviews/items/'+revId);
    deleted=true;
  }catch(e){
    // If SP returns 200/204 but fetch still throws (e.g. no-body JSON parse), treat as success
    if(e.message&&(e.message.includes('204')||e.message.includes('200'))){
      deleted=true;
    } else {
      showToast('Could not delete entry. Please try again.');
      console.error('[delete]',e);
    }
  }
  if(deleted){
    reviews=reviews.filter(r=>r.spItemId!==revId);
    showToast('Entry deleted.');
    try{
      const wasOpen=document.querySelector('.proj-card[data-pid="'+projId+'"]')?.classList.contains('open');
      renderAll();
      if(wasOpen){const c=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c)c.classList.add('open');}
    }catch(e2){console.warn('[delete renderAll]',e2);}
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// Refresh project data periodically so pipeline changes appear without manual reload
let _refreshTimer=null;
function _startRefresh(){
  _refreshTimer=setInterval(async()=>{
    if(document.hidden||!accessToken) return;
    try{
      const pd=await graphGet(SP+'/CORE_Projects/items?$expand=fields&$select=id,fields&$top=500');
      // Rebuild projects array preserving existing reviews
      const newProjects=buildProjectsList(pd.value||[]);
      if(newProjects.length) projects=newProjects;
      renderAll();
    }catch(e){ console.warn('[refresh]',e); }
  },90000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ clearInterval(_refreshTimer); }
  else if(accessToken) _startRefresh();
});
