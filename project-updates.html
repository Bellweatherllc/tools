<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Updates — CORE</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TTNormsPro-Regular.woff2') format('woff2');font-weight:400;}
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TTNormsPro-Medium.woff2') format('woff2');font-weight:500;}
@font-face{font-family:'TT Norms Pro';src:url('https://bellweatherllc.github.io/tools/fonts/TTNormsPro-Bold.woff2') format('woff2');font-weight:700;}
@font-face{font-family:'Swear Text';src:url('https://bellweatherllc.github.io/tools/fonts/SwearText-Italic.woff2') format('woff2');font-style:italic;}
@font-face{font-family:'Swear Display';src:url('https://bellweatherllc.github.io/tools/fonts/SwearDisplay-BlackItalic.woff2') format('woff2');font-style:italic;font-weight:900;}

:root{
  --navy:#1f2e3e;
  --gold:#d8b64f;
  --gold-light:#f9e6ae;
  --gl:rgba(216,182,79,1);
  --bg:#f5f3ee;
  --surface:#fff;
  --border:#e4dac4;
  --text:#282828;
  --text-sec:#7a7a7a;
  --text-muted:#a3a3a3;
  --green:#019425;
  --green-bg:rgba(1,148,37,.08);
  --red:#a30a0a;
  --red-bg:rgba(163,10,10,.06);
  --radius:6px;
  --app-h:44px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'TT Norms Pro',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

/* ── Auth overlay ── */
#authOverlay{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
#authOverlay.hidden{display:none;}
.auth-card{display:flex;flex-direction:column;align-items:center;gap:18px;padding:40px 44px 36px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.40);min-width:320px;text-align:center;}
.auth-logo{height:44px;width:auto;opacity:.90;}
.auth-title{font-family:'Swear Text',serif;font-size:18px;font-weight:700;color:var(--gl);letter-spacing:.02em;}
.auth-subtitle{font-family:'TT Norms Pro',sans-serif;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.35);}
.auth-version{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.20);margin-top:-8px;}
.auth-sign-in{font-family:'TT Norms Pro',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(216,182,79,.18);color:var(--gold);border:1px solid rgba(216,182,79,.40);border-radius:6px;padding:10px 28px;cursor:pointer;transition:background .14s,border-color .14s;margin-top:4px;}
.auth-sign-in:hover{background:rgba(216,182,79,.28);border-color:rgba(216,182,79,.65);}
.auth-status{font-size:11px;color:rgba(255,255,255,.45);min-height:18px;}

/* ── App header ── */
.app-header{background:var(--navy);padding:0 18px;height:var(--app-h);display:flex;align-items:center;gap:11px;position:fixed;top:0;left:0;right:0;z-index:400;box-shadow:0 2px 14px rgba(0,0,0,.22);}
.bw-logo{height:22px;width:auto;display:block;}
.hd{width:1px;height:18px;background:rgba(255,255,255,.15);}
.hdr-title{font-family:'Swear Text',serif;color:rgba(255,255,255,.55);font-size:13px;}
.proto-badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.12);padding:2px 7px;border-radius:3px;}
.hsp{flex:1;}
.conn-wrap{display:flex;align-items:center;gap:6px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#555;transition:background .3s;}
.conn-label{font-size:11px;color:rgba(255,255,255,.45);}

/* Admin toggle — matches pipeline admin switch style */
.admin-ctrl{display:flex;align-items:center;gap:8px;padding:0 12px;border-left:1px solid rgba(255,255,255,.10);}
.admin-ctrl-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);transition:color .2s;}
.admin-switch{cursor:pointer;flex-shrink:0;}
.admin-switch input{display:none;}
.admin-track{display:flex;align-items:center;width:34px;height:18px;border-radius:9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);transition:background .2s,border-color .2s;padding:2px;}
.admin-thumb{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.40);transition:transform .2s,background .2s;}
.admin-switch input:checked + .admin-track{background:rgba(216,182,79,.28);border-color:rgba(216,182,79,.50);}
.admin-switch input:checked + .admin-track .admin-thumb{transform:translateX(16px);background:var(--gold);}
body.admin-mode .admin-ctrl-label{color:rgba(255,255,255,.70);}

/* ── Main ── */
#mainApp{padding-top:var(--app-h);}
#mainApp.hidden{display:none;}

/* ── Controls bar ── */
.controls-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:var(--app-h);z-index:100;}
.sort-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);}
.sort-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:'TT Norms Pro',sans-serif;font-size:11px;font-weight:600;color:var(--text-sec);cursor:pointer;transition:all .12s;}
.sort-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.admin-banner{display:none;align-items:center;gap:6px;background:rgba(216,182,79,.10);border:1px solid rgba(216,182,79,.35);border-radius:4px;padding:3px 10px;}
.admin-banner.visible{display:flex;}
.admin-banner span{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--gold);}
.proj-count{margin-left:auto;font-size:11px;color:var(--text-muted);}

/* ── Projects area ── */
.projects-area{padding:16px 20px;max-width:860px;display:flex;flex-direction:column;gap:10px;}

/* ── Project card ── */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.proj-card.has-unreviewed{border-color:rgba(216,182,79,.45);}

.proj-card-hdr{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .1s;}
.proj-card-hdr:hover{background:rgba(31,46,62,.025);}
.proj-chev{font-size:9px;color:var(--text-muted);transition:transform .18s;flex-shrink:0;}
.proj-card.open .proj-chev{transform:rotate(90deg);}
.pip{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.proj-card-name{font-family:'Swear Text',serif;font-style:italic;font-size:16px;color:var(--navy);flex:1;line-height:1.2;}
.proj-hdr-meta{display:flex;align-items:center;gap:18px;flex-shrink:0;}
.meta-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.meta-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.meta-val{font-size:13px;font-weight:700;color:var(--text);}
.meta-val.up{color:var(--green);}
.meta-val.down{color:var(--red);}

.proj-card-body{border-top:1px solid var(--border);display:none;}
.proj-card.open .proj-card-body{display:block;}

/* Team row */
.team-row{padding:8px 16px;background:rgba(31,46,62,.03);border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;}
.team-member{display:flex;flex-direction:column;gap:1px;}
.team-role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.team-name{font-size:12px;font-weight:600;color:var(--navy);}

/* Fields */
.proj-fields{padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;border-bottom:1px solid var(--border);}
.field-blk{display:flex;flex-direction:column;gap:4px;}
.field-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);}
.field-val{font-size:18px;font-weight:700;color:var(--navy);line-height:1.1;}
.field-val.muted{color:var(--text-muted);font-size:14px;}
.field-val.up{color:var(--green);}
.field-val.down{color:var(--red);}
.field-sub{font-size:10px;color:var(--text-muted);}

/* Edit form */
.proj-edit-form{display:none;padding:14px 16px;background:rgba(216,182,79,.04);border-bottom:1px solid rgba(216,182,79,.20);}
.proj-edit-form.visible{display:block;}
.edit-form-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:12px;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.edit-field{display:flex;flex-direction:column;gap:4px;}
.edit-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);}
.edit-input{border:1.5px solid var(--border);border-radius:4px;padding:7px 10px;font-family:'TT Norms Pro',sans-serif;font-size:13px;color:var(--text);background:var(--surface);width:100%;transition:border-color .12s;}
.edit-input:focus{outline:none;border-color:var(--gold);}
.edit-note-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.edit-note{width:100%;border:1.5px solid var(--border);border-radius:4px;padding:7px 10px;font-family:'TT Norms Pro',sans-serif;font-size:13px;color:var(--text);background:var(--surface);resize:vertical;min-height:52px;transition:border-color .12s;}
.edit-note:focus{outline:none;border-color:var(--gold);}
.edit-actions{display:flex;align-items:center;gap:10px;}
.save-btn{font-family:'TT Norms Pro',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--navy);color:#fff;border:none;border-radius:4px;padding:8px 20px;cursor:pointer;transition:background .12s;}
.save-btn:hover{background:#2d4258;}
.save-btn:disabled{opacity:.4;cursor:default;}
.save-feedback{font-size:11px;color:var(--text-muted);}

/* Readonly nudge */
#readonlyNudge{position:fixed;bottom:20px;right:20px;background:var(--navy);color:rgba(255,255,255,.80);padding:9px 15px;border-radius:5px;font-size:12px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.25);pointer-events:none;display:none;}
#readonlyNudge.show{display:block;}

/* Log */
.proj-log{padding:12px 16px;}
.log-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;}
.log-empty{font-size:12px;color:var(--text-muted);font-style:italic;}
.log-entry{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.log-entry:last-child{border-bottom:none;}
.log-meta{display:flex;flex-direction:column;gap:2px;}
.log-who{font-size:11px;font-weight:700;color:var(--navy);}
.log-when{font-size:10px;color:var(--text-muted);}
.log-body{display:flex;flex-direction:column;gap:3px;}
.log-delta{font-size:13px;font-weight:700;}
.log-delta.up{color:var(--green);}
.log-delta.down{color:var(--red);}
.log-end{font-size:12px;color:var(--text-sec);}
.log-note{font-size:12px;color:var(--text);font-style:italic;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:5px;font-size:12px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .22s;}
.toast.show{opacity:1;}

.state-msg{padding:48px 20px;color:var(--text-sec);font-size:13px;}
.state-msg strong{display:block;font-size:16px;color:var(--navy);margin-bottom:5px;}
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-card">
    <img class="auth-logo" src="https://bellweatherllc.github.io/tools/logos/Monogram-Linen.svg" alt="Bellweather">
    <div>
      <div class="auth-title">Project Updates</div>
      <div class="auth-subtitle">Bellweather Design Build</div>
    </div>
    <div class="auth-version" id="authVersionBadge">v2</div>
    <button class="auth-sign-in" onclick="doSignIn()">Sign in with Microsoft</button>
    <div class="auth-status" id="authStatus"></div>
  </div>
</div>

<div class="app-header">
  <img class="bw-logo" src="https://bellweatherllc.github.io/tools/logos/Monogram-Linen.svg" alt="Bellweather">
  <div class="hd"></div>
  <div class="hdr-title">Project Updates</div>
  <div class="proto-badge" id="versionBadge">v2</div>
  <div class="hsp"></div>
  <div class="conn-wrap">
    <div class="conn-dot" id="connDot"></div>
    <div class="conn-label" id="connLabel">Connecting…</div>
  </div>
  <div class="admin-ctrl" id="adminCtrl" style="display:none">
    <span class="admin-ctrl-label">Admin</span>
    <label class="admin-switch" title="Toggle admin mode">
      <input type="checkbox" id="adminCheckbox" onchange="toggleAdminMode()">
      <span class="admin-track"><span class="admin-thumb"></span></span>
    </label>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="controls-bar">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sortAlpha" onclick="setSort('alpha')">A → Z</button>
    <button class="sort-btn" id="sortEnd" onclick="setSort('end')">End Date</button>
    <div class="admin-banner" id="adminBanner">
      <span>⚡ ADMIN MODE — changes save immediately</span>
    </div>
    <span class="proj-count" id="projCount"></span>
  </div>
  <div class="projects-area" id="projectsArea">
    <div class="state-msg" id="loadingMsg"><strong>Loading…</strong>Fetching construction projects.</div>
  </div>
</div>

<div id="readonlyNudge">Enable Admin Mode to make changes</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

const MSAL_CONFIG={auth:{clientId:'84b37f0e-b149-4089-9bdc-fc654715db23',authority:'https://login.microsoftonline.com/ff0e3f46-615a-4a22-8a80-4bb83d627785',redirectUri:window.location.origin+window.location.pathname},cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false}};
const SCOPES=['https://graph.microsoft.com/Sites.ReadWrite.All'];
const SP=`https://graph.microsoft.com/v1.0/sites/bellweather.sharepoint.com:/sites/BWCore:/lists`;
const EPOCH_MS=Date.UTC(2025,0,5); // Jan 5 2025 UTC — pipeline epoch

let msalApp=null,accessToken='',currentUser='',isAdmin=false,adminModeOn=false,sortMode='alpha';
let projects=[],reviews=[];

// ── Auth ──────────────────────────────────────────────────────────────────
async function initMsal(){
  msalApp=new msal.PublicClientApplication(MSAL_CONFIG);
  try{const r=await msalApp.handleRedirectPromise();if(r&&r.accessToken){accessToken=r.accessToken;onAuthenticated(r.account);return;}}catch(e){console.warn('[auth]',e.message);}
  const accs=msalApp.getAllAccounts();
  if(accs.length){
    try{const r=await msalApp.acquireTokenSilent({scopes:SCOPES,account:accs[0]});accessToken=r.accessToken;onAuthenticated(accs[0]);}
    catch(e){document.getElementById('authOverlay').classList.remove('hidden');}
  } else {
    document.getElementById('authOverlay').classList.remove('hidden');
  }
}
function doSignIn(){msalApp.loginRedirect({scopes:SCOPES});}
async function onAuthenticated(account){
  currentUser=account.name||account.username||'Unknown';
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('connDot').style.background='#22c55e';
  document.getElementById('connLabel').textContent=currentUser;
  await loadAll();
}

// ── Graph ─────────────────────────────────────────────────────────────────
async function graphGet(url,extraHeaders={}){
  const r=await fetch(url,{headers:{Authorization:'Bearer '+accessToken,...extraHeaders}});
  if(!r.ok) throw new Error('Graph '+r.status+' '+url.split('?')[0].split('/').pop());
  return r.json();
}
async function graphPatch(url,body){
  const r=await fetch(url,{method:'PATCH',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('Graph PATCH '+r.status+': '+(await r.text()).slice(0,120));
  return r.json();
}
async function graphPost(url,body){
  const r=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('Graph POST '+r.status+': '+(await r.text()).slice(0,120));
  return r.json();
}

// ── Load ──────────────────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('loadingMsg').style.display='';
  try{
    // Team members — check ProjectUpdatesRole
    const td=await graphGet(SP+'/CORE_TeamMembers/items?$expand=fields&$select=id,fields&$top=200');
    const members=td.value||[];
    const me=members.find(m=>{
      const n=(m.fields.EmployeeName||m.fields.Title||'').toLowerCase();
      const u=currentUser.toLowerCase();
      return u.includes(n.split(' ')[0])||n.includes(u.split(' ')[0]);
    });
    isAdmin=!!(me&&(me.fields.ProjectUpdatesRole||'').trim());
    if(isAdmin) document.getElementById('adminCtrl').style.display='flex';

    // CORE_Projects — CA Signed
    const pd=await graphGet(SP+'/CORE_Projects/items?$expand=fields&$select=id,fields&$top=500');
    projects=(pd.value||[])
      .filter(item=>{
        const s=(item.fields.PipelineStage||'').toLowerCase().replace(/[-\s]/g,'');
        return s==='casigned';
      })
      .map(item=>{
        const f=item.fields||{};
        let gantt={};
        try{gantt=JSON.parse(f.GanttData||'{}');}catch(e){}
        const prodPhases=(gantt.productionLane?.phases)||[];
        const lastPh=prodPhases[prodPhases.length-1];
        let endDate=null;
        if(lastPh){
          const endWk=(lastPh.startWeek||0)+(lastPh.durWeeks||0);
          const ms=EPOCH_MS+endWk*7*24*3600*1000;
          const d=new Date(ms);
          endDate=d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
        }
        return{
          spItemId:item.id,id:item.id,
          displayName:f.ClientName||f.ProjectName||item.id,
          clientName:f.ClientName||'',projectName:f.ProjectName||'',
          estimatedValue:f.EstimatedProjectValue||'',
          designer:f.DesignerName||'',secondaryDesigner:f.SecondaryDesigner||'',
          pm:f.PMName||'',lc1:f.LogisticsCoordinator1||'',lc2:f.LogisticsCoordinator2||'',
          sales:f.SalesPerson||'',
          endDate,gantt,
        };
      });

    // CORE_ProjectReviews
    await loadReviews();
    renderProjects();
  }catch(e){
    console.error('[load]',e);
    document.getElementById('loadingMsg').innerHTML='<strong>Error loading data</strong>'+e.message;
  }
}

async function loadReviews(){
  const rd=await graphGet(
    SP+'/CORE_ProjectReviews/items?$expand=fields&$select=id,fields&$top=500',
    {'Prefer':'HonorNonIndexedQueriesWarningMayFailRandomly'}
  );
  reviews=(rd.value||[]).map(item=>({spItemId:item.id,...item.fields}));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function parseBudget(s){return parseInt(String(s||'').replace(/[^0-9]/g,''))||0;}
function fmtCurrency(n){
  if(!n&&n!==0) return '—';
  if(n>=1000000) return '$'+(n/1000000).toFixed(2).replace(/\.?0+$/,'')+'M';
  if(n>=1000) return '$'+Math.round(n/1000)+'k';
  return '$'+n;
}
function fmtDate(iso){
  if(!iso) return '—';
  const[y,m,d]=iso.slice(0,10).split('-').map(Number);
  return new Date(Date.UTC(y,m-1,d)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
}
function fmtDateTime(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function projReviews(id){
  return reviews.filter(r=>r.ProjectId===id).sort((a,b)=>new Date(b.EntryDate||0)-new Date(a.EntryDate||0));
}
function cumDelta(id){
  return projReviews(id).reduce((s,r)=>s+(parseFloat(r.CostDelta)||0),0);
}
function latestEnd(proj){
  const r=projReviews(proj.id).find(r=>r.NewEndDate);
  return r?r.NewEndDate.slice(0,10):proj.endDate;
}
function hasUnreviewed(id){return reviews.some(r=>r.ProjectId===id&&!r.Reviewed);}

// ── Sort / Render ─────────────────────────────────────────────────────────
function setSort(m){
  sortMode=m;
  document.getElementById('sortAlpha').classList.toggle('active',m==='alpha');
  document.getElementById('sortEnd').classList.toggle('active',m==='end');
  renderProjects();
}
function sorted(){
  const c=[...projects];
  if(sortMode==='alpha') c.sort((a,b)=>a.displayName.localeCompare(b.displayName));
  else c.sort((a,b)=>{
    const ea=latestEnd(a),eb=latestEnd(b);
    if(!ea&&!eb) return 0; if(!ea) return 1; if(!eb) return -1;
    return ea.localeCompare(eb);
  });
  return c;
}

function renderProjects(){
  const area=document.getElementById('projectsArea');
  document.getElementById('loadingMsg').style.display='none';
  const list=sorted();
  document.getElementById('projCount').textContent=list.length+' project'+(list.length!==1?'s':'')+' in construction';
  // Preserve open state
  const open=new Set([...area.querySelectorAll('.proj-card.open')].map(el=>el.dataset.pid));
  area.innerHTML='';
  if(!list.length){area.innerHTML='<div class="state-msg"><strong>No projects in construction</strong>CA-signed projects appear here.</div>';return;}
  list.forEach(p=>buildCard(p,area,open.has(p.id)));
}

function buildCard(proj,container,startOpen){
  const delta=cumDelta(proj.id);
  const base=parseBudget(proj.estimatedValue);
  const current=base+delta;
  const end=latestEnd(proj);
  const revs=projReviews(proj.id);
  const unrev=hasUnreviewed(proj.id);

  const card=document.createElement('div');
  card.className='proj-card'+(startOpen?' open':'')+(unrev?' has-unreviewed':'');
  card.dataset.pid=proj.id;

  // Header
  const hdr=document.createElement('div');
  hdr.className='proj-card-hdr';
  hdr.innerHTML=`
    <span class="proj-chev">▶</span>
    ${unrev?'<div class="pip" title="Unreviewed changes"></div>':''}
    <div class="proj-card-name">${proj.displayName}</div>
    <div class="proj-hdr-meta">
      <div class="meta-item">
        <span class="meta-lbl">Est. Value</span>
        <span class="meta-val ${delta>0?'up':delta<0?'down':''}">${fmtCurrency(current)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-lbl">End Date</span>
        <span class="meta-val">${fmtDate(end)}</span>
      </div>
    </div>`;
  hdr.addEventListener('click',()=>card.classList.toggle('open'));
  card.appendChild(hdr);

  // Body
  const body=document.createElement('div');
  body.className='proj-card-body';

  // Team
  const teamItems=[
    proj.sales&&{role:'Sales',name:proj.sales},
    proj.designer&&{role:'Design',name:proj.designer+(proj.secondaryDesigner?' · '+proj.secondaryDesigner:'')},
    proj.pm&&{role:'PM',name:proj.pm},
    (proj.lc1||proj.lc2)&&{role:'Logistics',name:[proj.lc1,proj.lc2].filter(Boolean).join(' · ')},
  ].filter(Boolean);
  if(teamItems.length){
    const tr=document.createElement('div');
    tr.className='team-row';
    teamItems.forEach(({role,name})=>tr.innerHTML+=`<div class="team-member"><span class="team-role">${role}</span><span class="team-name">${name}</span></div>`);
    body.appendChild(tr);
  }

  // Fields
  const flds=document.createElement('div');
  flds.className='proj-fields';
  flds.innerHTML=`
    <div class="field-blk">
      <div class="field-lbl">Original Value</div>
      <div class="field-val">${fmtCurrency(base)}</div>
      ${delta?`<div class="field-sub">Adjusted ${delta>0?'+':''}${fmtCurrency(Math.abs(delta))}</div>`:'<div class="field-sub">No adjustments</div>'}
    </div>
    <div class="field-blk">
      <div class="field-lbl">Current Value</div>
      <div class="field-val ${delta>0?'up':delta<0?'down':''}">${fmtCurrency(current)}</div>
      <div class="field-sub">${revs.filter(r=>r.CostDelta).length} adjustment${revs.filter(r=>r.CostDelta).length!==1?'s':''}</div>
    </div>
    <div class="field-blk">
      <div class="field-lbl">End Date</div>
      <div class="field-val ${!end?'muted':''}">${fmtDate(end)}</div>
      <div class="field-sub">${proj.endDate&&end!==proj.endDate?'Original: '+fmtDate(proj.endDate):'From Gantt'}</div>
    </div>`;
  flds.addEventListener('click',()=>{if(!adminModeOn) showNudge();});
  body.appendChild(flds);

  // Edit form
  const form=document.createElement('div');
  form.className='proj-edit-form'+(adminModeOn?' visible':'');
  form.id='form_'+proj.id;
  form.innerHTML=`
    <div class="edit-form-hdr">Log a Change</div>
    <div class="edit-grid">
      <div class="edit-field">
        <label class="edit-lbl">Cost Change ($)</label>
        <input class="edit-input" type="number" id="delta_${proj.id}" placeholder="+50000 or -25000" step="1000">
      </div>
      <div class="edit-field">
        <label class="edit-lbl">New End Date</label>
        <input class="edit-input" type="date" id="end_${proj.id}" value="${end||''}">
      </div>
    </div>
    <div class="edit-note-field">
      <label class="edit-lbl">Note (optional)</label>
      <textarea class="edit-note" id="note_${proj.id}" placeholder="Reason for change…" maxlength="500"></textarea>
    </div>
    <div class="edit-actions">
      <button class="save-btn" onclick="submitChange('${proj.id}')">Save Change</button>
      <span class="save-feedback" id="fb_${proj.id}"></span>
    </div>`;
  body.appendChild(form);

  // Log
  const log=document.createElement('div');
  log.className='proj-log';
  log.innerHTML=`<div class="log-hdr">Change History</div>`;
  if(!revs.length){
    log.innerHTML+='<div class="log-empty">No changes recorded yet.</div>';
  } else {
    revs.forEach(r=>{
      const dv=parseFloat(r.CostDelta)||0;
      let content='';
      if(dv) content+=`<div class="log-delta ${dv>0?'up':'down'}">${dv>0?'+':''}${fmtCurrency(Math.abs(dv))} ${dv>0?'increase':'decrease'}</div>`;
      if(r.NewEndDate) content+=`<div class="log-end">End date → ${fmtDate(r.NewEndDate.slice(0,10))}</div>`;
      if(r.Notes) content+=`<div class="log-note">${r.Notes}</div>`;
      const entry=document.createElement('div');
      entry.className='log-entry';
      entry.innerHTML=`
        <div class="log-meta"><div class="log-who">${r.ReviewerName||'—'}</div><div class="log-when">${fmtDateTime(r.EntryDate)}</div></div>
        <div class="log-body">${content||'<span style="color:var(--text-muted);font-size:11px">Note only</span>'}</div>`;
      log.appendChild(entry);
    });
  }
  body.appendChild(log);
  card.appendChild(body);
  container.appendChild(card);
}

// ── Admin mode ────────────────────────────────────────────────────────────
function toggleAdminMode(){
  adminModeOn=document.getElementById('adminCheckbox').checked;
  document.body.classList.toggle('admin-mode',adminModeOn);
  document.getElementById('adminBanner').classList.toggle('visible',adminModeOn);
  document.querySelectorAll('.proj-edit-form').forEach(f=>f.classList.toggle('visible',adminModeOn));
}
function showNudge(){
  const n=document.getElementById('readonlyNudge');
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2200);
}

// ── Submit ────────────────────────────────────────────────────────────────
async function submitChange(projId){
  const proj=projects.find(p=>p.id===projId);if(!proj) return;
  const dEl=document.getElementById('delta_'+projId);
  const eEl=document.getElementById('end_'+projId);
  const nEl=document.getElementById('note_'+projId);
  const fb=document.getElementById('fb_'+projId);
  const btn=document.querySelector('#form_'+projId+' .save-btn');

  const delta=parseFloat(dEl.value)||0;
  const newEnd=eEl.value||'';
  const note=nEl.value.trim();

  if(!delta&&!newEnd&&!note){fb.textContent='Enter a cost change, new end date, or note.';return;}

  btn.disabled=true;fb.textContent='Saving…';

  let entryType='Note';
  if(delta&&newEnd) entryType='Combined';
  else if(delta) entryType='Cost';
  else if(newEnd) entryType='EndDate';

  try{
    // Write review entry
    await graphPost(SP+'/CORE_ProjectReviews/items',{fields:{
      ProjectId:projId,
      ProjectName:proj.displayName,
      ReviewerName:currentUser,
      EntryDate:new Date().toISOString(),
      CostDelta:delta||null,
      NewEndDate:newEnd||null,
      Notes:note||null,
      EntryType:entryType,
      Reviewed:false,
    }});

    // Update EstimatedProjectValue
    if(delta){
      const newTotal=parseBudget(proj.estimatedValue)+cumDelta(proj.id)+delta;
      await graphPatch(SP+'/CORE_Projects/items/'+proj.spItemId,{fields:{EstimatedProjectValue:'$'+newTotal.toLocaleString()}});
      proj.estimatedValue='$'+newTotal.toLocaleString();
    }

    // Update GanttData production end
    if(newEnd&&newEnd!==proj.endDate){
      const newEndMs=Date.UTC(...newEnd.split('-').map((v,i)=>i===1?+v-1:+v));
      const newEndWk=Math.round((newEndMs-EPOCH_MS)/(7*24*3600*1000));
      const gantt=JSON.parse(JSON.stringify(proj.gantt));
      const phases=gantt.productionLane?.phases||[];
      if(phases.length){
        const last=phases[phases.length-1];
        last.durWeeks=Math.max(1,newEndWk-(last.startWeek||0));
      }
      await graphPatch(SP+'/CORE_Projects/items/'+proj.spItemId,{fields:{GanttData:JSON.stringify(gantt)}});
      proj.gantt=gantt;proj.endDate=newEnd;
    }

    await loadReviews();
    dEl.value='';nEl.value='';
    fb.textContent='Saved.';
    btn.disabled=false;

    const wasOpen=document.querySelector('.proj-card[data-pid="'+projId+'"]')?.classList.contains('open');
    renderProjects();
    if(wasOpen){const c=document.querySelector('.proj-card[data-pid="'+projId+'"]');if(c)c.classList.add('open');}
    showToast('Change saved.');
  }catch(e){
    console.error('[submit]',e);
    fb.textContent='Error: '+e.message;
    btn.disabled=false;
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

initMsal();
</script>
