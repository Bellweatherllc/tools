<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BW Tool Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #1B2B4B;
      --navy-mid:    #243560;
      --navy-light:  #2E4070;
      --gold:        #C9A84C;
      --gold-light:  #DFC070;
      --gold-pale:   #FBF5E6;
      --cream:       #F5F1EB;
      --white:       #FFFFFF;
      --g100:        #EEEAE4;
      --g200:        #DEDAD3;
      --g400:        #9D9590;
      --g600:        #5C5650;
      --danger:      #c0392b;
      --shadow-sm:   0 2px 8px rgba(27,43,75,0.10);
      --shadow-md:   0 6px 22px rgba(27,43,75,0.16);
      --shadow-lg:   0 16px 48px rgba(27,43,75,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: var(--navy);
      height: 58px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand-bw {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    .brand-sep {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.2);
      align-self: center;
    }

    .brand-name {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* Admin toggle */
    .admin-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
      user-select: none;
    }

    .admin-lbl.on { color: var(--gold); }

    .tog {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .tog input { opacity: 0; width: 0; height: 0; position: absolute; }

    .tog-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.18);
      border-radius: 12px;
      transition: background 0.25s;
    }

    .tog-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .tog input:checked ~ .tog-track  { background: var(--gold); }
    .tog input:checked ~ .tog-thumb  { transform: translateX(20px); }

    /* ── Admin bar ──────────────────────────────────────────────── */
    .admin-bar {
      display: none;
      background: var(--navy);
      border-bottom: 2px solid var(--gold);
      padding: 10px 28px;
      gap: 10px;
      align-items: center;
    }

    body.admin .admin-bar { display: flex; }

    .admin-bar-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold);
      margin-right: 4px;
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
      text-decoration: none;
    }

    .btn:active { opacity: 0.85; }

    .btn-gold   { background: var(--gold); color: var(--navy); }
    .btn-gold:hover { background: var(--gold-light); }

    .btn-ghost  { background: transparent; border: 1.5px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    .btn-navy   { background: var(--navy); color: white; }
    .btn-navy:hover { background: var(--navy-mid); }

    .btn-outline { background: transparent; border: 1.5px solid var(--g200); color: var(--g600); }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

    .btn-danger  { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }

    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* ── Main layout ─────────────────────────────────────────────── */
    .main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Section ─────────────────────────────────────────────────── */
    .section {
      margin-bottom: 48px;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--navy);
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--navy);
      flex: 1;
    }

    .section-title-input {
      flex: 1;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--navy);
      border: none;
      border-bottom: 2px solid var(--gold);
      background: transparent;
      outline: none;
      padding: 2px 4px;
    }

    .section-count {
      font-size: 10px;
      font-weight: 500;
      color: var(--g400);
      letter-spacing: 0.06em;
    }

    .section-acts {
      display: none;
      gap: 6px;
    }

    body.admin .section-acts { display: flex; }

    /* ── Tile grid ───────────────────────────────────────────────── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
      min-height: 60px;
      border-radius: 10px;
      transition: outline 0.15s;
    }

    .tile-grid.drag-over-zone {
      outline: 2px dashed var(--gold);
      outline-offset: 6px;
    }

    /* ── Tile ────────────────────────────────────────────────────── */
    .tile {
      background: var(--white);
      border-radius: 10px;
      padding: 16px 18px 14px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.18s, transform 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
      border: 2px solid transparent;
      border-left: 4px solid var(--g100);
      overflow: hidden;
    }

    body:not(.admin) .tile:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-left-color: var(--gold);
    }

    body.admin .tile {
      cursor: grab;
      border-left-color: var(--g200);
    }

    body.admin .tile:active { cursor: grabbing; }

    .tile.dragging {
      opacity: 0.35;
      transform: scale(0.96);
    }

    .tile.drop-target {
      border-color: var(--gold);
      background: var(--gold-pale);
    }

    .tile-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.25;
      padding-right: 20px; /* room for drag handle */
    }

    .tile-desc {
      font-size: 11.5px;
      font-weight: 400;
      color: var(--g600);
      line-height: 1.45;
    }

    .tile-url {
      font-size: 10px;
      color: var(--g400);
      margin-top: auto;
      padding-top: 8px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Drag handle */
    .drag-hdl {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      color: var(--g400);
      cursor: grab;
      padding: 2px;
    }

    .drag-hdl:active { cursor: grabbing; }

    body.admin .drag-hdl { display: block; }

    /* Edit button */
    .tile-edit {
      display: none;
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--g400);
      padding: 3px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .tile-edit:hover { color: var(--gold); background: var(--g100); }

    body.admin .tile-edit { display: block; }

    /* Add tile placeholder */
    .add-tile-btn {
      display: none;
      background: var(--white);
      border: 2px dashed var(--g200);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--g400);
      transition: border-color 0.2s, color 0.2s;
      min-height: 60px;
    }

    .add-tile-btn:hover { border-color: var(--gold); color: var(--navy); }

    body.admin .add-tile-btn { display: flex; }

    /* ── Modal ───────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27,43,75,0.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 30px 32px;
      width: 460px;
      max-width: 92vw;
      box-shadow: var(--shadow-lg);
      animation: modal-in 0.18s ease;
    }

    @keyframes modal-in {
      from { transform: scale(0.96) translateY(8px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 22px;
      border-bottom: 2px solid var(--g100);
      padding-bottom: 14px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .field label span {
      font-weight: 400;
      color: var(--g400);
      text-transform: none;
      letter-spacing: 0;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid var(--g200);
      border-radius: 7px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: var(--navy);
      outline: none;
      transition: border-color 0.15s;
      background: white;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--gold);
    }

    .field textarea {
      resize: vertical;
      min-height: 70px;
    }

    .modal-foot {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 22px;
      padding-top: 16px;
      border-top: 2px solid var(--g100);
    }

    .modal-foot .left { margin-right: auto; }

    /* ── Base URL note ───────────────────────────────────────────── */
    .base-url-note {
      font-size: 12px;
      color: var(--g600);
      line-height: 1.5;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: var(--g100);
      border-radius: 6px;
      border-left: 3px solid var(--gold);
    }

    /* ── Empty section placeholder ───────────────────────────────── */
    .empty-placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--g400);
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="brand">
      <span class="brand-bw">BW</span>
      <div class="brand-sep"></div>
      <span class="brand-name">Tool Index</span>
    </div>
    <div class="admin-wrap">
      <span class="admin-lbl" id="adminLbl">Admin</span>
      <label class="tog">
        <input type="checkbox" id="adminTog" onchange="setAdmin(this.checked)">
        <div class="tog-track"></div>
        <div class="tog-thumb"></div>
      </label>
    </div>
  </header>

  <!-- ── Admin bar ── -->
  <div class="admin-bar">
    <span class="admin-bar-label">Admin Mode</span>
    <button class="btn btn-gold" onclick="openAddSection()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 4v16M4 12h16"/></svg>
      Add Section
    </button>
    <button class="btn btn-ghost" onclick="openBaseUrl()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 010 18M3 12h18" stroke-linecap="round"/></svg>
      Base URL
    </button>
    <button class="btn btn-ghost" onclick="resetToDefaults()" style="margin-left:auto;">Reset to Defaults</button>
  </div>

  <!-- ── Sections ── -->
  <main class="main" id="main"></main>

  <!-- ── Tile Modal ── -->
  <div class="overlay" id="tileOv">
    <div class="modal">
      <div class="modal-title" id="tileOvTitle">Add Tool</div>
      <div class="field">
        <label>Tool Name</label>
        <input id="t-name" placeholder="e.g. Project Pipeline">
      </div>
      <div class="field">
        <label>URL / Filename</label>
        <input id="t-url" placeholder="e.g. project-pipeline.html">
      </div>
      <div class="field">
        <label>Description <span>(optional, one line)</span></label>
        <input id="t-desc" placeholder="e.g. Gantt-style production &amp; sales planner">
      </div>
      <div class="field">
        <label>Section</label>
        <select id="t-sec"></select>
      </div>
      <div class="modal-foot">
        <button class="btn btn-danger left" id="t-del" onclick="deleteTile()">Remove</button>
        <button class="btn btn-outline" onclick="closeTileOv()">Cancel</button>
        <button class="btn btn-navy" onclick="saveTile()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── Section Modal ── -->
  <div class="overlay" id="secOv">
    <div class="modal">
      <div class="modal-title">Add Section</div>
      <div class="field">
        <label>Section Name</label>
        <input id="s-name" placeholder="e.g. Extractors &amp; Analyzers">
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" onclick="closeSecOv()">Cancel</button>
        <button class="btn btn-navy" onclick="saveSection()">Add</button>
      </div>
    </div>
  </div>

  <!-- ── Base URL Modal ── -->
  <div class="overlay" id="buOv">
    <div class="modal">
      <div class="modal-title">Base URL</div>
      <p class="base-url-note">If your tools are in the same folder as this index, leave blank. Otherwise enter the shared path prefix for all tool URLs.</p>
      <div class="field">
        <label>Base URL</label>
        <input id="bu-val" placeholder="e.g. https://yoursite.sharepoint.com/sites/tools/">
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" onclick="closeBuOv()">Cancel</button>
        <button class="btn btn-navy" onclick="saveBaseUrl()">Save</button>
      </div>
    </div>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════
  //  State & Defaults
  // ════════════════════════════════════════════════════════════════

  const SK = 'bw-tool-index-v1';

  const DEFAULTS = {
    baseUrl: '',
    sections: [
      { id: 's-pipeline',   title: 'Pipeline & Planning' },
      { id: 's-agreements', title: 'Agreements & Contracts' },
      { id: 's-extractors', title: 'Extractors & Analyzers' },
      { id: 's-process',    title: 'Process & Design' },
      { id: 's-admin',      title: 'SharePoint & Admin' },
      { id: 's-ref',        title: 'Reference' },
    ],
    tiles: {
      'project-pipeline':        { id:'project-pipeline',        sec:'s-pipeline',   label:'Project Pipeline',        url:'project-pipeline.html',        desc:'Gantt-style production, design & sales planner' },
      'core-projects-manager':   { id:'core-projects-manager',   sec:'s-pipeline',   label:'Projects Manager',        url:'core-projects-manager.html',   desc:'Core project management hub' },
      'core_roadmap':            { id:'core_roadmap',            sec:'s-pipeline',   label:'Core Roadmap',            url:'core_roadmap.html',            desc:'Development & feature roadmap' },
      'project-basis':           { id:'project-basis',           sec:'s-pipeline',   label:'Project Basis',           url:'project-basis.html',           desc:'Project basis documentation' },
      'ca-setup':                { id:'ca-setup',                sec:'s-agreements', label:'CA Setup',                url:'ca-setup.html',                desc:'Construction Agreement setup' },
      'CA_DataSources':          { id:'CA_DataSources',          sec:'s-agreements', label:'CA Data Sources',         url:'CA_DataSources.html',          desc:'Data sources for CAs' },
      'da_extractor':            { id:'da_extractor',            sec:'s-agreements', label:'DA Extractor',            url:'da_extractor.html',            desc:'Design Agreement data extractor' },
      'reference_ca_extractor':  { id:'reference_ca_extractor',  sec:'s-agreements', label:'Reference CA Extractor',  url:'reference_ca_extractor.html',  desc:'Pulls reference data from past CAs' },
      'scope_outline_extractor': { id:'scope_outline_extractor', sec:'s-extractors', label:'Scope Outline Extractor', url:'scope_outline_extractor.html', desc:'Extracts scope outline data' },
      'estimate_extractor':      { id:'estimate_extractor',      sec:'s-extractors', label:'Estimate Extractor',      url:'estimate_extractor.html',      desc:'Pulls estimate line items' },
      'selections_extractor':    { id:'selections_extractor',    sec:'s-extractors', label:'Selections Extractor',    url:'selections_extractor.html',    desc:'Extracts selections data' },
      'plan_note_extractor':     { id:'plan_note_extractor',     sec:'s-extractors', label:'Plan Note Extractor',     url:'plan_note_extractor.html',     desc:'Pulls notes from plan documents' },
      'timecard-analyzer':       { id:'timecard-analyzer',       sec:'s-extractors', label:'Timecard Analyzer',       url:'timecard-analyzer.html',       desc:'Analyzes timecard data' },
      'people-analyzer':         { id:'people-analyzer',         sec:'s-extractors', label:'People Analyzer',         url:'people-analyzer.html',         desc:'Team capacity & role analysis' },
      'cp-process-scoring':      { id:'cp-process-scoring',      sec:'s-process',    label:'CP Process Scoring',      url:'cp-process-scoring.html',      desc:'Preconstruction process scoring' },
      'design-deliverables':     { id:'design-deliverables',     sec:'s-process',    label:'Design Deliverables',     url:'design-deliverables.html',     desc:'Tracks design phase deliverables' },
      'fba_tool_JW':             { id:'fba_tool_JW',             sec:'s-process',    label:'FBA Tool (JW)',           url:'fba_tool_JW.html',             desc:'Field-based analysis tool' },
      'sharepoint-sherpa':       { id:'sharepoint-sherpa',       sec:'s-admin',      label:'SharePoint Sherpa',       url:'sharepoint-sherpa.html',       desc:'SharePoint navigation & lookup guide' },
      'sherpa-lookup-tester':    { id:'sherpa-lookup-tester',    sec:'s-admin',      label:'Sherpa Lookup Tester',    url:'sherpa-lookup-tester.html',    desc:'Tests Sherpa path lookups' },
      'core-admin':              { id:'core-admin',              sec:'s-admin',      label:'Core Admin',              url:'core-admin.html',              desc:'System-wide admin controls' },
      'team-members':            { id:'team-members',            sec:'s-admin',      label:'Team Members',            url:'team-members.html',            desc:'Team directory & roles' },
      'bellweather-style-guide': { id:'bellweather-style-guide', sec:'s-ref',        label:'Style Guide',             url:'bellweather-style-guide.html', desc:'Brand, color & UI standards' },
    },
    order: {
      's-pipeline':   ['project-pipeline','core-projects-manager','core_roadmap','project-basis'],
      's-agreements': ['ca-setup','CA_DataSources','da_extractor','reference_ca_extractor'],
      's-extractors': ['scope_outline_extractor','estimate_extractor','selections_extractor','plan_note_extractor','timecard-analyzer','people-analyzer'],
      's-process':    ['cp-process-scoring','design-deliverables','fba_tool_JW'],
      's-admin':      ['sharepoint-sherpa','sherpa-lookup-tester','core-admin','team-members'],
      's-ref':        ['bellweather-style-guide'],
    }
  };

  let state = loadState();
  let admin = false;
  let editId = null;        // tile being edited
  let dragId = null;        // tile being dragged
  let dragSec = null;       // source section of dragged tile

  // ════════════════════════════════════════════════════════════════
  //  Persistence
  // ════════════════════════════════════════════════════════════════

  function loadState() {
    try {
      const s = localStorage.getItem(SK);
      if (s) return JSON.parse(s);
    } catch(e) {}
    return deepClone(DEFAULTS);
  }

  function save() {
    localStorage.setItem(SK, JSON.stringify(state));
  }

  function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function resetToDefaults() {
    if (!confirm('Reset to default layout? All edits, custom tiles, and section changes will be lost.')) return;
    state = deepClone(DEFAULTS);
    save();
    render();
  }

  // ════════════════════════════════════════════════════════════════
  //  Render
  // ════════════════════════════════════════════════════════════════

  function render() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    state.sections.forEach(sec => {
      const tileIds = state.order[sec.id] || [];
      const wrap = document.createElement('div');
      wrap.className = 'section';
      wrap.dataset.sec = sec.id;

      // Section header
      const head = document.createElement('div');
      head.className = 'section-head';

      const titleEl = document.createElement('div');
      titleEl.className = 'section-title';
      titleEl.id = 'sec-title-' + sec.id;
      titleEl.textContent = sec.title;

      const countEl = document.createElement('div');
      countEl.className = 'section-count';
      countEl.textContent = tileIds.length + ' tool' + (tileIds.length !== 1 ? 's' : '');

      const acts = document.createElement('div');
      acts.className = 'section-acts';
      acts.innerHTML = `
        <button class="btn btn-sm btn-gold" onclick="editSecTitle('${sec.id}')">Rename</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSec('${sec.id}')">Remove</button>
      `;

      head.appendChild(titleEl);
      head.appendChild(countEl);
      head.appendChild(acts);
      wrap.appendChild(head);

      // Grid
      const grid = document.createElement('div');
      grid.className = 'tile-grid';
      grid.id = 'grid-' + sec.id;
      grid.addEventListener('dragover', e => {
        if (!admin) return;
        e.preventDefault();
        grid.classList.add('drag-over-zone');
      });
      grid.addEventListener('dragleave', e => {
        if (!grid.contains(e.relatedTarget)) grid.classList.remove('drag-over-zone');
      });
      grid.addEventListener('drop', e => {
        e.preventDefault();
        grid.classList.remove('drag-over-zone');
        if (!admin || !dragId) return;
        // Drop onto grid background (not a tile) → append
        moveTileToSec(dragId, sec.id, null);
      });

      // Render tiles
      if (tileIds.length === 0 && !admin) {
        const ph = document.createElement('div');
        ph.className = 'empty-placeholder';
        ph.textContent = 'No tools in this section.';
        grid.appendChild(ph);
      } else {
        tileIds.forEach(tid => {
          const tile = state.tiles[tid];
          if (!tile) return;
          grid.appendChild(makeTile(tile));
        });
      }

      // Add-tile button
      const addBtn = document.createElement('button');
      addBtn.className = 'add-tile-btn';
      addBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 4v16M4 12h16"/></svg> Add Tool`;
      addBtn.onclick = () => openAddTile(sec.id);
      grid.appendChild(addBtn);

      wrap.appendChild(grid);
      main.appendChild(wrap);
    });
  }

  function makeTile(tile) {
    const url = resolveUrl(tile.url);

    const el = document.createElement('a');
    el.className = 'tile';
    el.href = url;
    el.target = '_blank';
    el.rel = 'noopener';
    el.dataset.tid = tile.id;
    el.draggable = admin;

    // Drag handle SVG
    const hdl = document.createElement('div');
    hdl.className = 'drag-hdl';
    hdl.title = 'Drag to reorder';
    hdl.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="5" r="1.8"/><circle cx="16" cy="5" r="1.8"/><circle cx="8" cy="12" r="1.8"/><circle cx="16" cy="12" r="1.8"/><circle cx="8" cy="19" r="1.8"/><circle cx="16" cy="19" r="1.8"/></svg>`;

    const name = document.createElement('div');
    name.className = 'tile-name';
    name.textContent = tile.label;

    const desc = document.createElement('div');
    desc.className = 'tile-desc';
    desc.textContent = tile.desc || '';
    if (!tile.desc) desc.style.display = 'none';

    const urlTag = document.createElement('div');
    urlTag.className = 'tile-url';
    urlTag.textContent = tile.url;

    // Edit button
    const editBtn = document.createElement('button');
    editBtn.className = 'tile-edit';
    editBtn.title = 'Edit';
    editBtn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>`;
    editBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); openEditTile(tile.id); });

    el.appendChild(hdl);
    el.appendChild(name);
    el.appendChild(desc);
    el.appendChild(urlTag);
    el.appendChild(editBtn);

    // Admin-mode click intercept
    el.addEventListener('click', e => { if (admin) e.preventDefault(); });

    // Drag events
    el.addEventListener('dragstart', e => {
      if (!admin) return;
      dragId = tile.id;
      dragSec = tile.sec;
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.tile-grid').forEach(g => g.classList.remove('drag-over-zone'));
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drop-target'));
      dragId = null;
      dragSec = null;
    });
    el.addEventListener('dragover', e => {
      if (!admin || !dragId || tile.id === dragId) return;
      e.preventDefault();
      e.stopPropagation();
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('drop-target'));
      el.classList.add('drop-target');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!admin || !dragId || tile.id === dragId) return;
      el.classList.remove('drop-target');
      moveTileToSec(dragId, tile.sec, tile.id);
    });

    return el;
  }

  // ════════════════════════════════════════════════════════════════
  //  Tile movement
  // ════════════════════════════════════════════════════════════════

  function moveTileToSec(tileId, targetSecId, beforeTileId) {
    const tile = state.tiles[tileId];
    const srcSecId = tile.sec;

    // Remove from source
    const srcOrder = state.order[srcSecId] || [];
    const srcIdx = srcOrder.indexOf(tileId);
    if (srcIdx > -1) srcOrder.splice(srcIdx, 1);

    // Add to target
    if (!state.order[targetSecId]) state.order[targetSecId] = [];
    const dstOrder = state.order[targetSecId];

    if (beforeTileId) {
      const dstIdx = dstOrder.indexOf(beforeTileId);
      if (dstIdx > -1) {
        dstOrder.splice(dstIdx, 0, tileId);
      } else {
        dstOrder.push(tileId);
      }
    } else {
      if (!dstOrder.includes(tileId)) dstOrder.push(tileId);
    }

    tile.sec = targetSecId;
    save();
    render();
  }

  // ════════════════════════════════════════════════════════════════
  //  Admin mode
  // ════════════════════════════════════════════════════════════════

  function setAdmin(on) {
    admin = on;
    document.body.classList.toggle('admin', on);
    const lbl = document.getElementById('adminLbl');
    lbl.classList.toggle('on', on);
    render();
  }

  // ════════════════════════════════════════════════════════════════
  //  Tile Modal
  // ════════════════════════════════════════════════════════════════

  function openAddTile(secId) {
    editId = null;
    document.getElementById('tileOvTitle').textContent = 'Add Tool';
    document.getElementById('t-name').value = '';
    document.getElementById('t-url').value = '';
    document.getElementById('t-desc').value = '';
    document.getElementById('t-del').style.display = 'none';
    fillSecSelect(secId);
    document.getElementById('tileOv').classList.add('open');
    document.getElementById('t-name').focus();
  }

  function openEditTile(tileId) {
    editId = tileId;
    const t = state.tiles[tileId];
    document.getElementById('tileOvTitle').textContent = 'Edit Tool';
    document.getElementById('t-name').value = t.label;
    document.getElementById('t-url').value = t.url;
    document.getElementById('t-desc').value = t.desc || '';
    document.getElementById('t-del').style.display = 'flex';
    fillSecSelect(t.sec);
    document.getElementById('tileOv').classList.add('open');
    document.getElementById('t-name').focus();
  }

  function fillSecSelect(selectedId) {
    const sel = document.getElementById('t-sec');
    sel.innerHTML = '';
    state.sections.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.title;
      if (s.id === selectedId) o.selected = true;
      sel.appendChild(o);
    });
  }

  function closeTileOv() {
    document.getElementById('tileOv').classList.remove('open');
    editId = null;
  }

  function saveTile() {
    const label = document.getElementById('t-name').value.trim();
    const url   = document.getElementById('t-url').value.trim();
    const desc  = document.getElementById('t-desc').value.trim();
    const secId = document.getElementById('t-sec').value;

    if (!label) { alert('Tool name is required.'); return; }
    if (!url)   { alert('URL is required.'); return; }

    if (editId) {
      const t = state.tiles[editId];
      const oldSec = t.sec;
      t.label = label;
      t.url   = url;
      t.desc  = desc;
      if (oldSec !== secId) {
        // Move section
        const src = state.order[oldSec] || [];
        const i = src.indexOf(editId);
        if (i > -1) src.splice(i, 1);
        if (!state.order[secId]) state.order[secId] = [];
        state.order[secId].push(editId);
        t.sec = secId;
      }
    } else {
      const id = 'tile-' + Date.now();
      state.tiles[id] = { id, sec: secId, label, url, desc };
      if (!state.order[secId]) state.order[secId] = [];
      state.order[secId].push(id);
    }

    save();
    closeTileOv();
    render();
  }

  function deleteTile() {
    if (!editId) return;
    const t = state.tiles[editId];
    if (!confirm(`Remove "${t.label}" from the index?`)) return;
    const ord = state.order[t.sec] || [];
    const i = ord.indexOf(editId);
    if (i > -1) ord.splice(i, 1);
    delete state.tiles[editId];
    save();
    closeTileOv();
    render();
  }

  // ════════════════════════════════════════════════════════════════
  //  Section Modal
  // ════════════════════════════════════════════════════════════════

  function openAddSection() {
    document.getElementById('s-name').value = '';
    document.getElementById('secOv').classList.add('open');
    document.getElementById('s-name').focus();
  }

  function closeSecOv() {
    document.getElementById('secOv').classList.remove('open');
  }

  function saveSection() {
    const title = document.getElementById('s-name').value.trim();
    if (!title) { alert('Section name is required.'); return; }
    const id = 'sec-' + Date.now();
    state.sections.push({ id, title });
    state.order[id] = [];
    save();
    closeSecOv();
    render();
  }

  function editSecTitle(secId) {
    const el = document.getElementById('sec-title-' + secId);
    const sec = state.sections.find(s => s.id === secId);
    if (!el || !sec) return;

    const inp = document.createElement('input');
    inp.className = 'section-title-input';
    inp.value = sec.title;

    const commit = () => {
      const v = inp.value.trim();
      if (v) sec.title = v;
      save();
      render();
    };

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  inp.blur();
      if (e.key === 'Escape') { inp.value = sec.title; inp.blur(); }
    });

    el.replaceWith(inp);
    inp.focus();
    inp.select();
  }

  function deleteSec(secId) {
    const sec = state.sections.find(s => s.id === secId);
    const count = (state.order[secId] || []).length;
    const msg = count > 0
      ? `Remove section "${sec.title}"? Its ${count} tool(s) will also be removed.`
      : `Remove section "${sec.title}"?`;
    if (!confirm(msg)) return;
    (state.order[secId] || []).forEach(id => delete state.tiles[id]);
    state.sections = state.sections.filter(s => s.id !== secId);
    delete state.order[secId];
    save();
    render();
  }

  // ════════════════════════════════════════════════════════════════
  //  Base URL Modal
  // ════════════════════════════════════════════════════════════════

  function openBaseUrl() {
    document.getElementById('bu-val').value = state.baseUrl || '';
    document.getElementById('buOv').classList.add('open');
    document.getElementById('bu-val').focus();
  }

  function closeBuOv() {
    document.getElementById('buOv').classList.remove('open');
  }

  function saveBaseUrl() {
    state.baseUrl = document.getElementById('bu-val').value.trim();
    save();
    closeBuOv();
    render();
  }

  function resolveUrl(url) {
    if (!url) return '#';
    if (url.startsWith('http') || url.startsWith('/') || url.startsWith('./')) return url;
    return (state.baseUrl || '') + url;
  }

  // ════════════════════════════════════════════════════════════════
  //  Overlay click-to-close
  // ════════════════════════════════════════════════════════════════

  ['tileOv','secOv','buOv'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });

  // Keyboard: Escape closes open modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
    }
  });

  // ════════════════════════════════════════════════════════════════
  //  Init
  // ════════════════════════════════════════════════════════════════

  render();

  </script>
</body>
</html>
