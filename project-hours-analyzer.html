// Phase palette (index into these by phase order)
const PHASE_COLORS = ['#3b5fa0','#5a8a5a','#8a6a3a','#7a4a8a','#3a7a8a'];

function renderGrid(jobUpper, data, globalMax) {
  const table = document.getElementById(`grid_${jobUpper}`);
  const { weeks, designers, grid, designerTotals, weekTotals } = data;
  // globalMax passed in from orchestrator for standardized sparkline scale
  let totalMax = 0;
  for (const w of weeks) if ((weekTotals[w]||0)>totalMax) totalMax=weekTotals[w];

  const colorMap = {}; let ci = 0;
  for (const d of designers) { colorMap[d] = CHART_COLORS[ci%CHART_COLORS.length]; ci++; }

  // Build week→phase map for this specific project
  const weekPhaseMap = {};
  const phaseNames = [];
  for (const w of weeks) {
    const ph = getPhaseForWeek(jobUpper, w);
    if (ph) {
      if (!phaseNames.includes(ph)) phaseNames.push(ph);
      if (!weekPhaseMap[w]) weekPhaseMap[w] = { name: ph, colorIdx: phaseNames.indexOf(ph) };
    }
  }

  const hasPhases = Object.keys(weekPhaseMap).length > 0;

  // Header — phase band row, then week labels
  const thead = document.createElement('thead');
  let theadHtml = '';
  if (hasPhases) {
    theadHtml += '<tr class="phase-row"><th class="phase-empty"></th>';
    let i = 0;
    while (i < weeks.length) {
      const ph = weekPhaseMap[weeks[i]];
      if (!ph) { theadHtml += '<th class="phase-gap"></th>'; i++; continue; }
      let span = 1;
      while (i + span < weeks.length && weekPhaseMap[weeks[i+span]]?.name === ph.name) span++;
      const colorCls = `ph-color-${ph.colorIdx % PHASE_COLORS.length}`;
      theadHtml += `<th class="phase-cell ${colorCls}" colspan="${span}" title="${ph.name}">${ph.name}</th>`;
      i += span;
    }
    theadHtml += '<th class="phase-empty"></th></tr>';
  }
  theadHtml += '<tr><th>Designer</th>' + weeks.map(w=>`<th>${formatWeekLabel(w)}</th>`).join('') + '<th class="total-col">Total</th></tr>';
  thead.innerHTML = theadHtml;
  table.appendChild(thead);

  // Store phase transition weeks on table for drawTrendOverlays to draw dividers
  const phaseTransitions = [];
  let lastPhase = null;
  for (let i = 0; i < weeks.length; i++) {
    const ph = weekPhaseMap[weeks[i]]?.name || null;
    if (ph && ph !== lastPhase && lastPhase !== null) phaseTransitions.push(i);
    lastPhase = ph;
  }
  table.dataset.phaseTransitions = JSON.stringify(phaseTransitions);

  const tbody = document.createElement('tbody');

  function makeCell(h) {
    if (h <= 0) return '<td class="zero"><span class="cell-num">–</span></td>';
    const display = h % 1 === 0 ? h : h.toFixed(1);
    return `<td class="has-hours"><span class="cell-num">${display}</span></td>`;
  }

  // Combined sparkline row — tall, shows project total across all designers
  const combinedVals = weeks.map(w => weekTotals[w] || 0);
  const combinedTotal = combinedVals.reduce((a, b) => a + b, 0);
  const combRow = document.createElement('tr'); combRow.className = 'trend-row-wrap combined-sparkline-row';
  let combHtml = `<td style="font-weight:700;font-size:10px;">All</td>`;
  for (const w of weeks) { const h = weekTotals[w]||0; combHtml += makeCell(h); }
  combHtml += `<td class="total-col"><span class="cell-num">${combinedTotal%1===0?combinedTotal:combinedTotal.toFixed(1)}</span></td>`;
  combRow.innerHTML = combHtml;
  combRow.dataset.trendVals = JSON.stringify(combinedVals);
  combRow.dataset.trendColor = CHART_COLORS[0];
  combRow.dataset.trendMax = globalMax;
  combRow.dataset.isCombined = '1';
  tbody.appendChild(combRow);

  // One row per designer (dimmed sparklines)
  for (const d of designers) {
    const tr = document.createElement('tr'); tr.className = 'trend-row-wrap';
    const vals = [], color = colorMap[d];
    let html = `<td><span class="proj-swatch" style="background:${color}"></span>${shortName(d)}</td>`;
    for (const w of weeks) { const h = grid[d][w]||0; vals.push(h); html += makeCell(h); }
    const tot = designerTotals[d]||0;
    html += `<td class="total-col"><span class="cell-num">${tot%1===0?tot:tot.toFixed(1)}</span></td>`;
    tr.innerHTML = html;
    tr.dataset.trendVals = JSON.stringify(vals);
    tr.dataset.trendColor = color;
    tr.dataset.trendMax = globalMax;
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  requestAnimationFrame(() => drawTrendOverlays(table, weeks.length, globalMax));

  // Phase summary panel
  renderPhaseSummary(jobUpper, data, designers, phaseNames, weekPhaseMap);
}

function renderPhaseSummary(jobUpper, data, designers, phaseNames, weekPhaseMap) {
  const panel = document.getElementById(`phasesummary_${jobUpper}`);
  if (!panel) return;
  if (!phaseNames || !phaseNames.length) { panel.classList.add('hidden'); return; }

  const phaseStats = {};
  for (const ph of phaseNames) phaseStats[ph] = { totalHours: 0, weekCount: 0, weeksWithHours: 0 };
  for (const w of data.weeks) {
    const ph = weekPhaseMap[w];
    if (!ph) continue;
    const ps = phaseStats[ph.name];
    if (!ps) continue;
    ps.weekCount++;
    let wkHours = 0;
    for (const d of designers) wkHours += data.grid[d][w] || 0;
    ps.totalHours += wkHours;
    if (wkHours > 0) ps.weeksWithHours++;
  }

  const fmt = h => h % 1 === 0 ? h : h.toFixed(1);
  let html = '<div class="phase-summary-title">Phase Averages — Design Hours / Week</div><div class="phase-summary-grid">';
  for (let i = 0; i < phaseNames.length; i++) {
    const ph = phaseNames[i];
    const ps = phaseStats[ph];
    const color = PHASE_COLORS[i % PHASE_COLORS.length];
    const avgActive = ps.weeksWithHours > 0 ? ps.totalHours / ps.weeksWithHours : 0;
    const avgAll = ps.weekCount > 0 ? ps.totalHours / ps.weekCount : 0;
    html += `<div class="phase-card">
      <div class="phase-card-name"><span class="phase-card-dot" style="background:${color}"></span>${ph}</div>
      <div class="phase-card-avg">${fmt(avgActive)} hrs/wk</div>
      <div class="phase-card-stats">${fmt(ps.totalHours)} total &middot; ${ps.weeksWithHours} active wks<br><span style="color:var(--text-light)">${fmt(avgAll)} incl. zero weeks</span></div>
    </div>`;
  }
  html += '</div>';
  panel.innerHTML = html;
  panel.classList.remove('hidden');
}

// --- Phase alert ---
function renderPhaseAlert() {
  const el = document.getElementById('phaseAlert');
  if (!el) return;
  if (!isOnline) { el.classList.add('hidden'); return; }

  const filtered = getFilteredEntries();
  const billableJobCodes = [...new Set(filtered.filter(e => !e.nonBillable).map(e => e.jobUpper))];

  const noRecord = [];    // in timecard, not in CORE_Projects at all
  const noPhases = [];    // in CORE_Projects but no resolvable phase data

  for (const code of billableJobCodes) {
    const proj = coreProjects[code];
    if (!proj) { noRecord.push(code); continue; }
    if (!proj.phases || proj.phases.length === 0) { noPhases.push(proj.displayName || code); continue; }
    // Non-standard name check removed — phases now built empirically
  }

  const hasIssues = noRecord.length || noPhases.length;
  if (!hasIssues) { el.classList.add('hidden'); return; }

  let body = '';
  if (noRecord.length > 0) {
    body += `<div style="margin-bottom:4px"><strong>Not found in CORE_Projects</strong> — job codes may not match:</div><div class="phase-alert-codes">${noRecord.join(', ')}</div>`;
  }
  if (noPhases.length > 0) {
    if (body) body += '<div style="margin-top:8px">';
    body += `<strong>Missing phase data</strong> (no GanttData or addedAt):<div class="phase-alert-codes">${noPhases.join(', ')}</div>`;
    if (body.includes('margin-top:8px')) body += '</div>';
  }
  const title = 'Phase data incomplete — averages may be partial';

  el.innerHTML = `<span class="phase-alert-icon">⚠</span><div class="phase-alert-body"><div class="phase-alert-title">${title}</div>${body}</div><button class="phase-alert-dismiss" onclick="this.closest('.phase-alert').classList.add('hidden')" title="Dismiss">✕</button>`;
  el.classList.remove('hidden');
}

// --- Job Code Modal ---
function showJobCodeModal() {
  const modal = document.getElementById('jobCodeModal');
  const body = document.getElementById('jobCodeModalBody');

  // Collect all unique job codes from timecard entries
  const allCodes = [...new Set(allEntries.filter(e => !e.nonBillable).map(e => e.jobUpper))].sort();

  // Separate into pre-construction and construction
  const preCon = [], con = [], unknown = [];
  for (const code of allCodes) {
    const proj = coreProjects[code];
    if (!proj) { unknown.push({ code, name: null, value: null, stage: null }); continue; }
    const valueResult = bestValue(proj);
    const entry = { code, name: proj.displayName, value: valueResult ? valueResult.value : null, stage: proj.stage };
    if (proj.stage === 'CA Signed') con.push(entry);
    else preCon.push(entry);
  }

  const sortName = (a, b) => (a.name || a.code).localeCompare(b.name || b.code);
  preCon.sort(sortName); con.sort(sortName); unknown.sort((a,b) => a.code.localeCompare(b.code));

  function renderRows(arr) {
    return arr.map(e => {
      const stageLbl = e.stage ? `<span class="jc-stage ${e.stage==='CA Signed'?'ca':'da'}">${e.stage}</span>` : '';
      const valLbl = e.value ? `<span class="jc-value">${fmtValue(e.value)}</span>` : '';
      return `<div class="jc-row"><span class="jc-code">${e.code}</span><span class="jc-name">${e.name||'—'}</span>${valLbl}${stageLbl}</div>`;
    }).join('');
  }

  let html = '';
  if (preCon.length) html += `<div class="jc-section-title">Pre-Construction (${preCon.length})</div>${renderRows(preCon)}`;
  if (con.length) html += `<div class="jc-section-title">Construction (${con.length})</div>${renderRows(con)}`;
  if (unknown.length) html += `<div class="jc-section-title">Not in CORE_Projects (${unknown.length})</div>${renderRows(unknown)}`;
  if (!html) html = '<div style="color:var(--text-muted);padding:20px 0;text-align:center">No billable job codes found in loaded timecards.</div>';

  body.innerHTML = html;
  modal.style.display = 'flex';
}

function copyJobCodeList() {
  const rows = document.querySelectorAll('#jobCodeModalBody .jc-row');
  let txt = '';
  let section = '';
  const sectionEls = document.querySelectorAll('#jobCodeModalBody .jc-section-title');
  // Build plain text version
  document.querySelectorAll('#jobCodeModalBody .jc-section-title, #jobCodeModalBody .jc-row').forEach(el => {
    if (el.classList.contains('jc-section-title')) {
      txt += '\n' + el.textContent.trim() + '\n' + '-'.repeat(30) + '\n';
    } else {
      const code = el.querySelector('.jc-code')?.textContent || '';
      const name = el.querySelector('.jc-name')?.textContent || '';
      const val = el.querySelector('.jc-value')?.textContent || '';
      txt += `${code.padEnd(14)}${name.padEnd(30)}${val}\n`;
    }
  });
  navigator.clipboard?.writeText(txt.trim()).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt.trim(); ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
  });
}

// --- Copy ---
function copyToClipboard(text) { if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(()=>{},()=>fbCopy(text)); else fbCopy(text); }
function fbCopy(text) { const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch{}document.body.removeChild(ta); }
function copyAllGrids() {
  let tsv = '';
  for (const jobUpper of allBillableJobs()) { const data=buildProjectData(jobUpper); if(!data.weeks.length)continue; const proj=coreProjects[jobUpper]; const lbl=proj?proj.displayName||jobUpper:jobUpper; tsv+=`${lbl}\nDesigner\t${data.weeks.map(formatWeekLabel).join('\t')}\tTotal\n`; for(const d of data.designers){tsv+=shortName(d);for(const w of data.weeks)tsv+=`\t${data.grid[d][w]||''}`;tsv+=`\t${data.designerTotals[d]||''}\n`;}tsv+='Total';let g=0;for(const w of data.weeks){const h=data.weekTotals[w]||0;g+=h;tsv+=`\t${h}`;}tsv+=`\t${g}\n\n`;}
  copyToClipboard(tsv); showToast('Copied');
}
function clearHistory() {
  if (!confirm('Clear all stored data? Cannot be undone.')) return;
  allEntries=[]; loadedFiles=[];
  saveToCache(); saveFilesToCache();
  // Note: does not delete from SharePoint — use file removal for that
  render(); showToast('Local history cleared');
}

// --- File handling ---
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

async function handleFiles(files) {
  let processed = 0, newCount = 0;
  for (const file of files) {
    if (loadedFiles.includes(file.name)) { showToast(`${file.name} already loaded`); continue; }
    const buf = await file.arrayBuffer();
    try {
      const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
      const parsed = parseTimecardFile(wb, file.name);
      const newOnes = dedup(allEntries, parsed);
      allEntries = allEntries.concat(newOnes);
      newCount += newOnes.length;
      loadedFiles.push(file.name);
      if (isOnline && newOnes.length > 0) await writeEntriesToSharePoint(newOnes);
      else saveToCache();
      saveFilesToCache();
      processed++;
    } catch (err) { console.error(err); showToast(`Error: ${file.name}`); processed++; }
  }
  render();
  if (newCount > 0) showToast(`Added ${newCount} entries from ${processed} file${processed>1?'s':''}`);
}

// --- Init ---
initMsal();
