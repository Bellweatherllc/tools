<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Project Hours</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Regular.woff2') format('woff2');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_DemiBold.woff2') format('woff2');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Bold.woff2') format('woff2');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Swear Text';
    src: url('https://bellweatherllc.github.io/tools/fonts/SwearText-Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Swear Text';
    src: url('https://bellweatherllc.github.io/tools/fonts/SwearText-MediumItalic.woff2') format('woff2');
    font-weight: 500; font-style: italic; font-display: swap;
  }
  :root {
    --bg: #F6F2EE;
    --surface: #FFFFFF;
    --border: #E5E1D8;
    --text: #282828;
    --text-muted: #9091A0;
    --text-light: #B7A9A3;
    --primary: #263860;
    --primary-bg: #EDF5F9;
    --primary-border: #D2D5D8;
    --success: #16803c;
    --warning: #d97706;
    --danger: #dc2626;
    --header-bg: #F6F2EE;
    --hover-bg: #faf8f4;
    --shadow: 0 1px 3px rgba(40,40,40,.06), 0 1px 2px rgba(40,40,40,.04);
    --radius: 8px;
    --font-sans: 'TT Norms Pro', -apple-system, system-ui, sans-serif;
    --font-serif: 'Swear Text', Georgia, serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; }

  /* Header */
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .topbar img { height: 28px; width: auto; opacity: 0.85; }
  h1 { font-family: var(--font-sans); font-size: 20px; font-weight: 500; letter-spacing: 0.02em; }
  h1 .accent { font-family: var(--font-serif); font-style: italic; font-weight: 500; }
  .version-badge { font-size: 10px; font-weight: 600; background: var(--primary); color: white; padding: 2px 7px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 0; }

  /* Header controls */
  .header-controls { display: flex; gap: 8px; align-items: center; }
  .save-indicator { font-size: 11px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
  .save-indicator .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .save-indicator .dot.saved { background: var(--success); }
  .save-indicator .dot.saving { background: var(--warning); }
  .save-indicator .dot.error { background: var(--danger); }

  /* File list button */
  .file-btn { font-size: 12px; color: var(--text-muted); background: var(--surface); padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border); cursor: pointer; font-family: var(--font-sans); transition: all .15s; position: relative; }
  .file-btn:hover { border-color: var(--primary); color: var(--primary); }
  .file-panel { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow), 0 8px 24px rgba(0,0,0,.08); min-width: 260px; z-index: 100; padding: 8px 0; }
  .file-panel.open { display: block; }
  .file-panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); padding: 6px 14px; }
  .file-panel-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px; font-size: 12px; }
  .file-panel-item:hover { background: var(--hover-bg); }
  .file-panel-item .fname { color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-panel-item .remove-btn { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 14px; padding: 0 4px; line-height: 1; }
  .file-panel-item .remove-btn:hover { color: var(--danger); }
  .file-panel-empty { padding: 12px 14px; font-size: 12px; color: var(--text-light); text-align: center; }

  /* Upload zone */
  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; background: var(--surface); cursor: pointer; transition: all .15s; margin-bottom: 24px; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: var(--primary-bg); }
  .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone .label { font-size: 14px; color: var(--text-muted); }
  .upload-zone .hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* Section */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; background: var(--header-bg); border-bottom: 1px solid var(--border); }
  .section-header h2 { font-family: var(--font-serif); font-size: 16px; font-weight: 500; }
  .section-header .meta { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 10px; font-family: var(--font-sans); }
  .chevron { font-size: 11px; color: var(--text-light); transition: transform .2s; }
  .chevron.open { transform: rotate(90deg); }
  .section-body.collapsed { display: none; }

  /* Grid table */
  .grid-wrap { overflow-x: auto; overflow-y: visible; padding: 0; }
  .hours-grid { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .hours-grid thead th { padding: 8px 10px; text-align: center; font-weight: 600; font-size: 11px; color: var(--text-muted); border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 2; white-space: nowrap; }
  .hours-grid thead th:first-child { text-align: left; position: sticky; left: 0; z-index: 3; min-width: 160px; background: var(--surface); }
  .hours-grid thead th.total-col { background: var(--header-bg); font-weight: 700; color: var(--text); }
  .hours-grid thead th.spark-col { min-width: 120px; width: 120px; background: var(--surface); }
  .hours-grid tbody td { padding: 6px 10px; text-align: center; font-family: var(--font-mono); font-size: 11px; border-bottom: 1px solid #f0ede8; color: var(--text); }
  .hours-grid tbody td:first-child { text-align: left; font-family: var(--font-sans); font-weight: 500; font-size: 12px; position: sticky; left: 0; background: var(--surface); z-index: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .hours-grid tbody td.total-col { background: var(--header-bg); font-weight: 600; }
  .hours-grid tbody td.has-hours { background: var(--primary-bg); color: var(--primary); font-weight: 500; }
  .hours-grid tbody td.zero { color: var(--border); }
  .hours-grid tbody td.spark-cell { padding: 4px 6px; vertical-align: middle; }
  .hours-grid tbody td.spark-cell svg { display: block; }
  .hours-grid tbody tr.nonbillable-row td { color: var(--text-light); }
  .hours-grid tbody tr.nonbillable-row td.has-hours { background: #f0ebe4; color: #8a6e42; }
  .hours-grid tbody tr.nonbillable-row td:first-child { color: var(--text-light); font-style: italic; }
  .hours-grid tbody tr.total-row td { font-weight: 700; border-top: 2px solid var(--border); border-bottom: none; background: var(--header-bg); font-size: 12px; color: var(--text); }
  .hours-grid tbody tr.total-row td:first-child { background: var(--header-bg); }
  .hours-grid tbody tr.total-row td.total-col { background: #e8e4dc; }
  .hours-grid tbody tr.total-row td.spark-cell { background: var(--header-bg); }
  .hours-grid tbody tr:hover td { background: var(--hover-bg); }
  .hours-grid tbody tr:hover td:first-child { background: var(--hover-bg); }
  .hours-grid tbody tr:hover td.has-hours { background: #dde8f0; }
  .hours-grid tbody tr.total-row:hover td { background: var(--header-bg); }

  /* Bar chart row inside grid */
  .hours-grid tbody tr.bar-row td { padding: 4px 2px; border-bottom: none; vertical-align: bottom; height: 80px; background: var(--surface); }
  .hours-grid tbody tr.bar-row td:first-child { vertical-align: bottom; font-size: 11px; color: var(--text-muted); font-weight: 500; font-style: normal; padding-bottom: 8px; }
  .bar-stack { display: flex; flex-direction: column-reverse; align-items: stretch; height: 100%; gap: 1px; }
  .bar-seg { border-radius: 2px 2px 0 0; min-height: 0; transition: opacity .15s; }
  .bar-seg:hover { opacity: 0.8; }

  /* Legend row */
  .legend-wrap { padding: 8px 18px 12px; display: flex; flex-wrap: wrap; gap: 6px 14px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Actions */
  .actions-bar { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border); background: var(--header-bg); }
  .btn { padding: 7px 14px; font-size: 12px; font-family: var(--font-sans); font-weight: 500; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
  .btn-primary:hover { background: #1d2d4e; }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: #fef2f2; }
  .hidden { display: none !important; }

  /* Summary bar */
  .summary-bar { display: flex; gap: 12px; padding: 12px 18px; flex-wrap: wrap; }
  .summary-stat { padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--header-bg); font-size: 12px; }
  .summary-stat .val { font-family: var(--font-mono); font-weight: 600; font-size: 16px; color: var(--primary); }
  .summary-stat .lbl { color: var(--text-muted); margin-top: 2px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: white; padding: 10px 20px; border-radius: 6px; font-size: 13px; transition: transform .3s; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <div class="topbar">
        <img src="https://bellweatherllc.github.io/tools/logos/Monogram-B.svg" alt="Bw">
        <h1>Designer <span class="accent">Project Hours</span><span class="version-badge">v1</span></h1>
      </div>
      <div class="subtitle">Weekly hours per project per designer</div>
    </div>
    <div class="header-controls">
      <div class="save-indicator" id="saveIndicator">
        <span class="dot saved"></span> <span id="saveText">Saved</span>
      </div>
      <div style="position:relative">
        <button class="file-btn" id="fileBtn" onclick="toggleFilePanel()">
          <span id="fileCount">No files loaded</span>
        </button>
        <div class="file-panel" id="filePanel">
          <div class="file-panel-title">Loaded Timecards</div>
          <div id="filePanelList"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <div class="icon">📊</div>
    <div class="label">Drop timecard XLSX files here, or click to browse</div>
    <div class="hint">Upload multiple pay periods to see trends over time</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none">
  </div>

  <div id="resultsArea" class="hidden">
    <div class="summary-bar" id="summaryBar"></div>
    <div id="designerSections"></div>
    <div class="actions-bar">
      <button class="btn btn-primary" onclick="copyAllGrids()">Copy All Grids (TSV)</button>
      <button class="btn btn-danger" onclick="clearHistory()">Clear All History</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DESIGNERS = ['Stephanie Hoffmeier', 'Sean Farrell', 'Hayley Wynne'];
const SHORT_NAMES = { 'Sean Farrell': 'Sean', 'Hayley Wynne': 'Hayley', 'Stephanie Hoffmeier': 'Stephanie' };
const NON_BILLABLE_JOBS = ['BWC', 'BWC GENERAL', 'GENERAL'];
const PTO_TAGS = ['6609', 'PTO', 'VACATION', 'SICK', 'HOLIDAY', 'COMP TIME'];
const STORAGE_KEY = 'bwc_project_hours';
const FILES_KEY = 'bwc_project_hours_files';

// Vivid but warm palette
const CHART_COLORS = [
  '#2563EB', '#DC6B20', '#16803c', '#C13584', '#7C3AED',
  '#0891B2', '#DB2777', '#4F772D', '#BE4D25', '#2A6FAF',
  '#9333EA', '#0D9488', '#CA6702', '#4361EE', '#7B2D26',
  '#059669', '#8E44AD', '#C27803', '#1D6FA5', '#B91C1C',
];

let allEntries = loadEntries();
let loadedFiles = loadFileList();

function loadEntries() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveEntries() {
  showSaveStatus('saving');
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries)); showSaveStatus('saved'); }
  catch { showSaveStatus('error'); }
}
function loadFileList() {
  try { const s = localStorage.getItem(FILES_KEY); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveFileList() {
  try { localStorage.setItem(FILES_KEY, JSON.stringify(loadedFiles)); } catch {}
}

function showSaveStatus(status) {
  const dot = document.querySelector('#saveIndicator .dot');
  const txt = document.getElementById('saveText');
  dot.className = 'dot ' + status;
  txt.textContent = status === 'saved' ? 'Saved' : status === 'saving' ? 'Saving…' : 'Error';
}

function isNonBillableJob(code) {
  if (!code) return false;
  return NON_BILLABLE_JOBS.includes(code.trim().toUpperCase());
}
function isPtoEntry(tag) {
  if (!tag) return false;
  const u = String(tag).toUpperCase();
  return PTO_TAGS.some(kw => u.includes(kw));
}
function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d);
  monday.setDate(diff);
  return monday.toISOString().slice(0, 10);
}
function formatWeekLabel(weekKey) {
  const d = new Date(weekKey + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function toggleSection(id, header) {
  document.getElementById(id).classList.toggle('collapsed');
  header.querySelector('.chevron').classList.toggle('open');
}

// --- File panel ---
function toggleFilePanel() {
  const panel = document.getElementById('filePanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    renderFilePanel();
    document.addEventListener('click', closeFilePanelOutside, true);
  } else {
    document.removeEventListener('click', closeFilePanelOutside, true);
  }
}
function closeFilePanelOutside(e) {
  const panel = document.getElementById('filePanel');
  const btn = document.getElementById('fileBtn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
    document.removeEventListener('click', closeFilePanelOutside, true);
  }
}
function renderFilePanel() {
  const list = document.getElementById('filePanelList');
  if (loadedFiles.length === 0) {
    list.innerHTML = '<div class="file-panel-empty">No timecards loaded yet</div>';
    return;
  }
  list.innerHTML = loadedFiles.map((f, i) => `
    <div class="file-panel-item">
      <span class="fname" title="${f}">${f}</span>
      <button class="remove-btn" title="Remove" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');
}
function removeFile(idx) {
  const fname = loadedFiles[idx];
  allEntries = allEntries.filter(e => e.sourceFile !== fname);
  loadedFiles.splice(idx, 1);
  saveEntries();
  saveFileList();
  renderFilePanel();
  render();
  showToast('Removed ' + fname);
}

// --- Parsing ---
function parseTimecardFile(workbook, filename) {
  const entries = [];
  for (const designer of DESIGNERS) {
    if (!workbook.SheetNames.includes(designer)) continue;
    const ws = workbook.Sheets[designer];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 7) continue;
      const dateVal = row[0], jobCode = String(row[1] || '').trim(), tag = String(row[3] || ''), hours = parseFloat(row[6]) || 0;
      if (!dateVal || !jobCode || hours <= 0) continue;
      if (isPtoEntry(tag)) continue;
      let dateStr;
      if (typeof dateVal === 'number') {
        const d = XLSX.SSF.parse_date_code(dateVal);
        dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      } else if (dateVal instanceof Date) {
        dateStr = dateVal.toISOString().slice(0, 10);
      } else {
        const parsed = new Date(dateVal);
        if (isNaN(parsed)) continue;
        dateStr = parsed.toISOString().slice(0, 10);
      }
      entries.push({ designer, date: dateStr, week: getWeekKey(dateStr), job: jobCode.trim(), jobUpper: jobCode.trim().toUpperCase(), hours, nonBillable: isNonBillableJob(jobCode), sourceFile: filename });
    }
  }
  return entries;
}
function deduplicateEntries(existing, incoming) {
  const keySet = new Set(existing.map(e => `${e.designer}|${e.date}|${e.jobUpper}|${e.hours}`));
  return incoming.filter(e => { const k = `${e.designer}|${e.date}|${e.jobUpper}|${e.hours}`; if (keySet.has(k)) return false; keySet.add(k); return true; });
}

// --- Aggregation ---
function buildDesignerData(designer) {
  const entries = allEntries.filter(e => e.designer === designer);
  const weeks = [...new Set(entries.map(e => e.week))].sort();
  const billableJobs = [...new Set(entries.filter(e => !e.nonBillable).map(e => e.job))].sort();
  const nbLabel = 'Non-Billable (BWC)';
  const grid = {};
  for (const job of billableJobs) { grid[job] = {}; for (const w of weeks) grid[job][w] = 0; }
  grid[nbLabel] = {}; for (const w of weeks) grid[nbLabel][w] = 0;
  for (const e of entries) {
    const key = e.nonBillable ? nbLabel : e.job;
    if (!grid[key]) { grid[key] = {}; for (const w of weeks) grid[key][w] = 0; if (!billableJobs.includes(key)) billableJobs.push(key); }
    grid[key][e.week] = (grid[key][e.week] || 0) + e.hours;
  }
  const jobTotals = {};
  for (const [job, wm] of Object.entries(grid)) jobTotals[job] = Object.values(wm).reduce((a, b) => a + b, 0);
  billableJobs.sort((a, b) => (jobTotals[b] || 0) - (jobTotals[a] || 0));
  const weekTotals = {};
  for (const w of weeks) { weekTotals[w] = 0; for (const job of Object.keys(grid)) weekTotals[w] += grid[job][w] || 0; }
  return { weeks, billableJobs, nbLabel, grid, jobTotals, weekTotals };
}

// --- Sparkline ---
function buildSparkline(values, maxVal, color, isBold) {
  if (!values || values.length === 0) return '';
  const w = 110, h = 28, pad = 3;
  const n = values.length;
  const anyNonZero = values.some(v => v > 0);
  if (!anyNonZero) return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/></svg>`;
  const scaleMax = maxVal > 0 ? maxVal : 1;
  const plotW = w - pad * 2, plotH = h - pad * 2;
  const points = values.map((v, i) => ({ x: pad + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW), y: pad + plotH - (v / scaleMax) * plotH }));
  if (points.length === 1) return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><circle cx="${points[0].x}" cy="${points[0].y}" r="3" fill="${color}"/></svg>`;
  let path;
  if (points.length === 2) { path = `M ${points[0].x},${points[0].y} L ${points[1].x},${points[1].y}`; }
  else {
    path = `M ${points[0].x},${points[0].y}`;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(i-1,0)], p1 = points[i], p2 = points[i+1], p3 = points[Math.min(i+2,points.length-1)];
      const t = 0.3;
      path += ` C ${p1.x+(p2.x-p0.x)*t},${p1.y+(p2.y-p0.y)*t} ${p2.x-(p3.x-p1.x)*t},${p2.y-(p3.y-p1.y)*t} ${p2.x},${p2.y}`;
    }
  }
  const fill = path + ` L ${points[points.length-1].x},${h-pad} L ${points[0].x},${h-pad} Z`;
  const sw = isBold ? 2 : 1.5, op = isBold ? 0.15 : 0.12;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><path d="${fill}" fill="${color}" opacity="${op}"/><path d="${path}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>${points.map((p,i) => values[i] > 0 ? `<circle cx="${p.x}" cy="${p.y}" r="${isBold?2.5:2}" fill="${color}"/>` : '').join('')}</svg>`;
}

// --- Render ---
function render() {
  if (allEntries.length === 0) {
    document.getElementById('resultsArea').classList.add('hidden');
    document.getElementById('fileCount').textContent = 'No files loaded';
    return;
  }
  document.getElementById('resultsArea').classList.remove('hidden');
  document.getElementById('fileCount').textContent = `${loadedFiles.length} file${loadedFiles.length !== 1 ? 's' : ''} loaded`;

  const allWeeks = [...new Set(allEntries.map(e => e.week))].sort();
  const totalHours = allEntries.reduce((s, e) => s + e.hours, 0);
  const billableHours = allEntries.filter(e => !e.nonBillable).reduce((s, e) => s + e.hours, 0);
  const uniqueProjects = new Set(allEntries.filter(e => !e.nonBillable).map(e => e.jobUpper)).size;
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="val">${allWeeks.length}</div><div class="lbl">Weeks tracked</div></div>
    <div class="summary-stat"><div class="val">${Math.round(totalHours)}</div><div class="lbl">Total hours</div></div>
    <div class="summary-stat"><div class="val">${Math.round(billableHours)}</div><div class="lbl">Billable hours</div></div>
    <div class="summary-stat"><div class="val">${uniqueProjects}</div><div class="lbl">Unique projects</div></div>
  `;

  const container = document.getElementById('designerSections');
  container.innerHTML = '';

  for (const designer of DESIGNERS) {
    const data = buildDesignerData(designer);
    if (data.weeks.length === 0) continue;
    const shortName = SHORT_NAMES[designer];
    const designerTotal = Object.values(data.weekTotals).reduce((a, b) => a + b, 0);
    const bodyId = `body_${shortName}`;

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header" onclick="toggleSection('${bodyId}', this)">
        <h2>${shortName}<span class="meta">${Math.round(designerTotal)} hrs across ${data.weeks.length} weeks</span></h2>
        <span class="chevron open">▶</span>
      </div>
      <div class="section-body" id="${bodyId}">
        <div class="grid-wrap"><table class="hours-grid" id="grid_${shortName}"></table></div>
        <div class="legend-wrap" id="legend_${shortName}"></div>
      </div>
    `;
    container.appendChild(section);
    renderGrid(shortName, data);
  }
}

function renderGrid(shortName, data) {
  const table = document.getElementById(`grid_${shortName}`);
  const { weeks, billableJobs, nbLabel, grid, jobTotals, weekTotals } = data;

  let globalMax = 0;
  for (const job of Object.keys(grid)) for (const w of weeks) if ((grid[job][w] || 0) > globalMax) globalMax = grid[job][w];
  let totalMax = 0;
  for (const w of weeks) if ((weekTotals[w] || 0) > totalMax) totalMax = weekTotals[w];
  const barMax = totalMax;

  // Header
  const thead = document.createElement('thead');
  let hdr = '<tr><th>Project</th>';
  for (const w of weeks) hdr += `<th>${formatWeekLabel(w)}</th>`;
  hdr += '<th class="total-col">Total</th><th class="spark-col">Trend</th></tr>';
  thead.innerHTML = hdr;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  // Build color map
  const colorMap = {};
  let colorIdx = 0;
  for (const job of billableJobs) { colorMap[job] = CHART_COLORS[colorIdx % CHART_COLORS.length]; colorIdx++; }
  colorMap[nbLabel] = '#B7A9A3';

  // Billable rows
  for (const job of billableJobs) {
    const tr = document.createElement('tr');
    const values = [];
    let html = `<td title="${job}">${job}</td>`;
    for (const w of weeks) {
      const h = grid[job][w] || 0; values.push(h);
      html += h > 0 ? `<td class="has-hours">${h % 1 === 0 ? h : h.toFixed(1)}</td>` : '<td class="zero">–</td>';
    }
    const tot = jobTotals[job] || 0;
    html += `<td class="total-col">${tot % 1 === 0 ? tot : tot.toFixed(1)}</td>`;
    html += `<td class="spark-cell">${buildSparkline(values, globalMax, colorMap[job])}</td>`;
    tr.innerHTML = html;
    tbody.appendChild(tr);
  }

  // Non-billable row
  const nbRow = document.createElement('tr');
  nbRow.className = 'nonbillable-row';
  const nbValues = [];
  let nbHtml = `<td>${nbLabel}</td>`;
  for (const w of weeks) { const h = grid[nbLabel][w] || 0; nbValues.push(h); nbHtml += h > 0 ? `<td class="has-hours">${h % 1 === 0 ? h : h.toFixed(1)}</td>` : '<td class="zero">–</td>'; }
  const nbTot = jobTotals[nbLabel] || 0;
  nbHtml += `<td class="total-col">${nbTot % 1 === 0 ? nbTot : nbTot.toFixed(1)}</td>`;
  nbHtml += `<td class="spark-cell">${buildSparkline(nbValues, globalMax, '#B7A9A3')}</td>`;
  nbRow.innerHTML = nbHtml;
  tbody.appendChild(nbRow);

  // Total row
  const totRow = document.createElement('tr');
  totRow.className = 'total-row';
  const totValues = [];
  let totHtml = '<td>Total</td>'; let grand = 0;
  for (const w of weeks) { const h = weekTotals[w] || 0; grand += h; totValues.push(h); totHtml += `<td class="total-col">${h % 1 === 0 ? h : h.toFixed(1)}</td>`; }
  totHtml += `<td class="total-col">${grand % 1 === 0 ? grand : grand.toFixed(1)}</td>`;
  totHtml += `<td class="spark-cell">${buildSparkline(totValues, totalMax, '#282828', true)}</td>`;
  totRow.innerHTML = totHtml;
  tbody.appendChild(totRow);

  // Stacked bar row
  const barRow = document.createElement('tr');
  barRow.className = 'bar-row';
  let barHtml = '<td style="font-family:var(--font-sans)"></td>';
  const allJobs = [...billableJobs, nbLabel];
  for (const w of weeks) {
    const weekTotal = weekTotals[w] || 0;
    let segs = '';
    for (const job of allJobs) {
      const h = grid[job][w] || 0;
      if (h <= 0) continue;
      const pct = barMax > 0 ? (h / barMax) * 100 : 0;
      segs += `<div class="bar-seg" style="height:${pct}%;background:${colorMap[job]}" title="${job}: ${h}h"></div>`;
    }
    barHtml += `<td><div class="bar-stack">${segs}</div></td>`;
  }
  barHtml += '<td class="total-col"></td><td></td>';
  barRow.innerHTML = barHtml;
  tbody.appendChild(barRow);

  table.appendChild(tbody);

  // Legend
  const legend = document.getElementById(`legend_${shortName}`);
  legend.innerHTML = allJobs.map(job => `<div class="legend-item"><div class="legend-swatch" style="background:${colorMap[job]}"></div>${job}</div>`).join('');
}

// --- Copy ---
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {}, () => fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea'); ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch {} document.body.removeChild(ta);
}
function copyAllGrids() {
  let tsv = '';
  for (const designer of DESIGNERS) {
    const data = buildDesignerData(designer);
    if (data.weeks.length === 0) continue;
    tsv += `${SHORT_NAMES[designer]}\nProject\t${data.weeks.map(formatWeekLabel).join('\t')}\tTotal\n`;
    for (const job of data.billableJobs) {
      tsv += job; for (const w of data.weeks) { const h = data.grid[job][w] || 0; tsv += `\t${h || ''}`; } tsv += `\t${data.jobTotals[job] || ''}\n`;
    }
    tsv += data.nbLabel; for (const w of data.weeks) { const h = data.grid[data.nbLabel][w] || 0; tsv += `\t${h || ''}`; } tsv += `\t${data.jobTotals[data.nbLabel] || ''}\n`;
    tsv += 'Total'; let g = 0; for (const w of data.weeks) { const h = data.weekTotals[w] || 0; g += h; tsv += `\t${h}`; } tsv += `\t${g}\n\n`;
  }
  copyToClipboard(tsv);
  showToast('All grids copied as TSV');
}
function clearHistory() {
  if (!confirm('Clear all stored timecard data? This cannot be undone.')) return;
  allEntries = []; loadedFiles = [];
  saveEntries(); saveFileList(); render();
  showToast('History cleared');
}

// --- File handling ---
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

function handleFiles(files) {
  let processed = 0, newCount = 0;
  for (const file of files) {
    if (loadedFiles.includes(file.name)) { showToast(`${file.name} already loaded`); continue; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const parsed = parseTimecardFile(wb, file.name);
        const newOnes = deduplicateEntries(allEntries, parsed);
        allEntries = allEntries.concat(newOnes);
        newCount += newOnes.length;
        loadedFiles.push(file.name);
        processed++;
        if (processed === files.length) { saveEntries(); saveFileList(); render(); showToast(`Added ${newCount} entries from ${processed} file${processed > 1 ? 's' : ''}`); }
      } catch (err) { console.error(err); showToast(`Error: ${file.name}`); processed++; }
    };
    reader.readAsArrayBuffer(file);
  }
}

render();
</script>
