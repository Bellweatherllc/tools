<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Project Hours</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Regular.woff2') format('woff2');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_DemiBold.woff2') format('woff2');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Norms Pro';
    src: url('https://bellweatherllc.github.io/tools/fonts/TT_Norms_Pro_Bold.woff2') format('woff2');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Swear Text';
    src: url('https://bellweatherllc.github.io/tools/fonts/SwearText-Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Swear Text';
    src: url('https://bellweatherllc.github.io/tools/fonts/SwearText-MediumItalic.woff2') format('woff2');
    font-weight: 500; font-style: italic; font-display: swap;
  }
  :root {
    --bg: #F6F2EE;           /* Cotton */
    --surface: #FFFFFF;       /* Marble */
    --border: #E5E1D8;        /* Linen */
    --text: #282828;           /* Limestone */
    --text-muted: #9091A0;     /* Slate */
    --text-light: #B7A9A3;     /* Teak */
    --primary: #263860;        /* Navy */
    --primary-bg: #EDF5F9;     /* Glass */
    --primary-border: #D2D5D8; /* Concrete */
    --accent: #54423E;         /* Mahogany */
    --accent-bg: #F6F2EE;      /* Cotton */
    --accent-border: #E5E1D8;  /* Linen */
    --success: #16803c;
    --warning: #d97706;
    --danger: #dc2626;
    --nonbillable-bg: #F6F2EE;
    --header-bg: #F6F2EE;      /* Cotton */
    --hover-bg: #faf8f4;
    --shadow: 0 1px 3px rgba(40,40,40,.06), 0 1px 2px rgba(40,40,40,.04);
    --radius: 8px;
    --font-sans: 'TT Norms Pro', -apple-system, system-ui, sans-serif;
    --font-serif: 'Swear Text', Georgia, serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }

  .container { max-width: 1400px; margin: 0 auto; }

  h1 {
    font-family: var(--font-sans);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  h1 .accent {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 500;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .topbar img {
    height: 28px;
    width: auto;
    opacity: 0.85;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .header-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .header-row .file-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--header-bg);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    background: var(--surface);
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 24px;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: var(--primary-bg);
  }

  .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone .label { font-size: 14px; color: var(--text-muted); }
  .upload-zone .hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
  }

  .section-header h2 {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 500;
  }

  .section-header .meta {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 10px;
  }

  .chevron {
    font-size: 11px;
    color: var(--text-light);
    transition: transform .2s;
  }

  .chevron.open { transform: rotate(90deg); }
  .section-body.collapsed { display: none; }

  /* Grid table */
  .grid-wrap {
    overflow-x: auto;
    overflow-y: visible;
    padding: 0;
  }

  .hours-grid {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 600px;
  }

  .hours-grid thead th {
    padding: 8px 10px;
    text-align: center;
    font-weight: 600;
    font-size: 11px;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
    white-space: nowrap;
  }

  .hours-grid thead th:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 3;
    min-width: 160px;
    background: var(--surface);
  }

  .hours-grid thead th.total-col {
    background: var(--header-bg);
    font-weight: 700;
    color: var(--text);
  }

  .hours-grid thead th.spark-col {
    min-width: 120px;
    width: 120px;
    background: var(--surface);
  }

  .hours-grid tbody td {
    padding: 6px 10px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    border-bottom: 1px solid #f0ede8;
    color: var(--text);
  }

  .hours-grid tbody td:first-child {
    text-align: left;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 12px;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .hours-grid tbody td.total-col {
    background: var(--header-bg);
    font-weight: 600;
  }

  .hours-grid tbody td.spark-cell {
    padding: 4px 6px;
    vertical-align: middle;
  }

  .hours-grid tbody td.spark-cell svg {
    display: block;
  }

  .hours-grid tbody tr.total-row td.spark-cell {
    background: var(--header-bg);
  }

  .hours-grid tbody td.has-hours {
    background: var(--primary-bg);
    color: var(--primary);
    font-weight: 500;
  }

  .hours-grid tbody td.zero { color: var(--border); }

  .hours-grid tbody tr.nonbillable-row td { color: var(--text-light); }
  .hours-grid tbody tr.nonbillable-row td.has-hours { background: #f0ebe4; color: var(--accent); }
  .hours-grid tbody tr.nonbillable-row td:first-child { color: var(--text-light); font-style: italic; }

  .hours-grid tbody tr.total-row td {
    font-weight: 700;
    border-top: 2px solid var(--border);
    border-bottom: none;
    background: var(--header-bg);
    font-size: 12px;
    color: var(--text);
  }

  .hours-grid tbody tr.total-row td:first-child {
    background: var(--header-bg);
  }

  .hours-grid tbody tr.total-row td.total-col {
    background: #e8e4dc;
  }

  .hours-grid tbody tr:hover td { background: var(--hover-bg); }
  .hours-grid tbody tr:hover td:first-child { background: var(--hover-bg); }
  .hours-grid tbody tr:hover td.has-hours { background: #dde8f0; }
  .hours-grid tbody tr.total-row:hover td { background: var(--header-bg); }

  /* Chart container */
  .chart-wrap {
    padding: 16px 18px;
    border-top: 1px solid var(--border);
  }

  .chart-wrap canvas {
    max-height: 260px;
  }

  /* Actions */
  .actions-bar {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--header-bg);
  }

  .btn {
    padding: 7px 14px;
    font-size: 12px;
    font-family: var(--font-sans);
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
  }

  .btn:hover { border-color: var(--primary); color: var(--primary); }

  .btn-primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .btn-primary:hover { background: #2d5a85; }

  .btn-danger {
    color: var(--danger);
    border-color: var(--danger);
  }

  .btn-danger:hover { background: #fef2f2; }

  .hidden { display: none !important; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    transition: transform .3s;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 12px;
    padding: 12px 18px;
    flex-wrap: wrap;
  }

  .summary-stat {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--header-bg);
    font-size: 12px;
  }

  .summary-stat .val {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 16px;
    color: var(--primary);
  }

  .summary-stat .lbl {
    color: var(--text-muted);
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <div class="topbar">
        <img src="https://bellweatherllc.github.io/tools/logos/Monogram-B.svg" alt="Bw">
        <h1>Designer <span class="accent">Project Hours</span></h1>
      </div>
      <div class="subtitle">Weekly hours per project per designer — upload timecard files to build the picture over time</div>
    </div>
    <div>
      <span class="file-count" id="fileCount">No files loaded</span>
    </div>
  </div>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📊</div>
    <div class="label">Drop timecard XLSX files here, or click to browse</div>
    <div class="hint">Upload multiple pay periods to see trends over time</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none">
  </div>

  <!-- Results -->
  <div id="resultsArea" class="hidden">
    <div class="summary-bar" id="summaryBar"></div>

    <div id="designerSections"></div>

    <div class="actions-bar">
      <button class="btn btn-primary" onclick="copyAllGrids()">Copy All Grids (TSV)</button>
      <button class="btn btn-danger" onclick="clearHistory()">Clear All History</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DESIGNERS = ['Stephanie Hoffmeier', 'Sean Farrell', 'Hayley Wynne'];
const SHORT_NAMES = {
  'Sean Farrell': 'Sean',
  'Hayley Wynne': 'Hayley',
  'Stephanie Hoffmeier': 'Stephanie'
};
const NON_BILLABLE_JOBS = ['BWC', 'BWC GENERAL', 'GENERAL'];
const PTO_TAGS = ['6609', 'PTO', 'VACATION', 'SICK', 'HOLIDAY', 'COMP TIME'];
const STORAGE_KEY = 'bwc_project_hours';
const FILES_KEY = 'bwc_project_hours_files';

// Color palette for chart stacks — brand-aligned
const CHART_COLORS = [
  '#263860',  // Navy
  '#54423E',  // Mahogany
  '#4a7c6f',  // Sage (warm green)
  '#9091A0',  // Slate
  '#8b6b4a',  // Warm brown
  '#5a7a9a',  // Steel blue
  '#7a6b8a',  // Muted plum
  '#6a8a6a',  // Forest
  '#a07050',  // Copper
  '#607890',  // Denim
  '#887766',  // Driftwood
  '#506a5a',  // Pine
  '#8a7060',  // Clay
  '#607080',  // Gunmetal
  '#6a5a4a',  // Umber
  '#708090',  // Slate blue
  '#806050',  // Sienna
  '#5a6a7a',  // Cadet
  '#907060',  // Terracotta
  '#4a5a6a',  // Charcoal blue
];

let allEntries = loadEntries();
let loadedFiles = loadFileList();
let chartInstances = {};

function loadEntries() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}

function saveEntries() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries)); } catch {}
}

function loadFileList() {
  try {
    const saved = localStorage.getItem(FILES_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch { return []; }
}

function saveFileList() {
  try { localStorage.setItem(FILES_KEY, JSON.stringify(loadedFiles)); } catch {}
}

function isNonBillableJob(code) {
  if (!code) return false;
  return NON_BILLABLE_JOBS.includes(code.trim().toUpperCase());
}

function isPtoEntry(tag) {
  if (!tag) return false;
  const upper = String(tag).toUpperCase();
  return PTO_TAGS.some(kw => upper.includes(kw));
}

function getWeekKey(date) {
  // Monday-based week key: "YYYY-MM-DD" of the Monday
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d);
  monday.setDate(diff);
  return monday.toISOString().slice(0, 10);
}

function formatWeekLabel(weekKey) {
  const d = new Date(weekKey + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleSection(id, header) {
  const body = document.getElementById(id);
  const chev = header.querySelector('.chevron');
  body.classList.toggle('collapsed');
  chev.classList.toggle('open');
}

// --- Parsing ---
function parseTimecardFile(workbook) {
  const entries = [];

  for (const designer of DESIGNERS) {
    if (!workbook.SheetNames.includes(designer)) continue;
    const ws = workbook.Sheets[designer];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 7) continue;

      const dateVal = row[0];
      const jobCode = String(row[1] || '').trim();
      const tag = String(row[3] || '');
      const hours = parseFloat(row[6]) || 0;

      if (!dateVal || !jobCode || hours <= 0) continue;
      if (isPtoEntry(tag)) continue;

      // Parse date
      let dateStr;
      if (typeof dateVal === 'number') {
        // Excel serial date
        const d = XLSX.SSF.parse_date_code(dateVal);
        dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      } else if (dateVal instanceof Date) {
        dateStr = dateVal.toISOString().slice(0, 10);
      } else {
        const parsed = new Date(dateVal);
        if (isNaN(parsed)) continue;
        dateStr = parsed.toISOString().slice(0, 10);
      }

      // Normalize the job code for grouping
      const jobNorm = jobCode.trim();

      entries.push({
        designer,
        date: dateStr,
        week: getWeekKey(dateStr),
        job: jobNorm,
        jobUpper: jobNorm.toUpperCase(),
        hours,
        nonBillable: isNonBillableJob(jobNorm),
      });
    }
  }

  return entries;
}

function deduplicateEntries(existing, incoming) {
  const keySet = new Set();
  for (const e of existing) {
    keySet.add(`${e.designer}|${e.date}|${e.jobUpper}|${e.hours}`);
  }

  const newEntries = [];
  for (const e of incoming) {
    const key = `${e.designer}|${e.date}|${e.jobUpper}|${e.hours}`;
    if (!keySet.has(key)) {
      keySet.add(key);
      newEntries.push(e);
    }
  }
  return newEntries;
}

// --- Data aggregation ---
function buildDesignerData(designer) {
  const entries = allEntries.filter(e => e.designer === designer);
  const weeks = [...new Set(entries.map(e => e.week))].sort();
  const billableJobs = [...new Set(entries.filter(e => !e.nonBillable).map(e => e.job))].sort();
  const nonBillableLabel = 'Non-Billable (BWC)';

  // Aggregate hours: job -> week -> hours
  const grid = {};

  for (const job of billableJobs) {
    grid[job] = {};
    for (const w of weeks) grid[job][w] = 0;
  }
  grid[nonBillableLabel] = {};
  for (const w of weeks) grid[nonBillableLabel][w] = 0;

  for (const e of entries) {
    if (e.nonBillable) {
      grid[nonBillableLabel][e.week] = (grid[nonBillableLabel][e.week] || 0) + e.hours;
    } else {
      if (!grid[e.job]) {
        grid[e.job] = {};
        for (const w of weeks) grid[e.job][w] = 0;
        if (!billableJobs.includes(e.job)) billableJobs.push(e.job);
      }
      grid[e.job][e.week] = (grid[e.job][e.week] || 0) + e.hours;
    }
  }

  // Job totals
  const jobTotals = {};
  for (const [job, weekMap] of Object.entries(grid)) {
    jobTotals[job] = Object.values(weekMap).reduce((a, b) => a + b, 0);
  }

  // Sort billable jobs by total hours descending
  billableJobs.sort((a, b) => (jobTotals[b] || 0) - (jobTotals[a] || 0));

  // Week totals
  const weekTotals = {};
  for (const w of weeks) {
    weekTotals[w] = 0;
    for (const job of Object.keys(grid)) {
      weekTotals[w] += grid[job][w] || 0;
    }
  }

  return { weeks, billableJobs, nonBillableLabel, grid, jobTotals, weekTotals };
}

// --- Rendering ---
function render() {
  if (allEntries.length === 0) {
    document.getElementById('resultsArea').classList.add('hidden');
    document.getElementById('fileCount').textContent = 'No files loaded';
    return;
  }

  document.getElementById('resultsArea').classList.remove('hidden');
  document.getElementById('fileCount').textContent = `${loadedFiles.length} file${loadedFiles.length !== 1 ? 's' : ''} loaded`;

  // Summary stats
  const allWeeks = [...new Set(allEntries.map(e => e.week))].sort();
  const totalHours = allEntries.reduce((s, e) => s + e.hours, 0);
  const billableHours = allEntries.filter(e => !e.nonBillable).reduce((s, e) => s + e.hours, 0);
  const uniqueProjects = new Set(allEntries.filter(e => !e.nonBillable).map(e => e.jobUpper)).size;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="val">${allWeeks.length}</div><div class="lbl">Weeks tracked</div></div>
    <div class="summary-stat"><div class="val">${Math.round(totalHours)}</div><div class="lbl">Total hours</div></div>
    <div class="summary-stat"><div class="val">${Math.round(billableHours)}</div><div class="lbl">Billable hours</div></div>
    <div class="summary-stat"><div class="val">${uniqueProjects}</div><div class="lbl">Unique projects</div></div>
  `;

  const container = document.getElementById('designerSections');
  container.innerHTML = '';

  // Destroy old charts
  for (const key of Object.keys(chartInstances)) {
    chartInstances[key].destroy();
    delete chartInstances[key];
  }

  for (const designer of DESIGNERS) {
    const data = buildDesignerData(designer);
    if (data.weeks.length === 0) continue;

    const shortName = SHORT_NAMES[designer];
    const designerTotal = Object.values(data.weekTotals).reduce((a, b) => a + b, 0);
    const sectionId = `section_${shortName}`;
    const bodyId = `body_${shortName}`;
    const chartId = `chart_${shortName}`;

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header" onclick="toggleSection('${bodyId}', this)">
        <h2>${shortName}<span class="meta">${Math.round(designerTotal)} hrs across ${data.weeks.length} weeks</span></h2>
        <span class="chevron open">▶</span>
      </div>
      <div class="section-body" id="${bodyId}">
        <div class="grid-wrap">
          <table class="hours-grid" id="grid_${shortName}"></table>
        </div>
        <div class="chart-wrap">
          <canvas id="${chartId}"></canvas>
        </div>
      </div>
    `;
    container.appendChild(section);

    renderGrid(shortName, data);
    renderChart(chartId, shortName, data);
  }
}

// --- Sparklines ---
function buildSparkline(values, maxVal, color, isBold) {
  if (!values || values.length === 0) return '';
  const w = 110, h = 28, pad = 3;
  const n = values.length;

  // If all zeros, return a flat line
  const anyNonZero = values.some(v => v > 0);
  if (!anyNonZero) {
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${pad}" y1="${h - pad}" x2="${w - pad}" y2="${h - pad}" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
    </svg>`;
  }

  const scaleMax = maxVal > 0 ? maxVal : 1;
  const plotW = w - pad * 2;
  const plotH = h - pad * 2;

  // Generate points
  const points = values.map((v, i) => ({
    x: pad + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW),
    y: pad + plotH - (v / scaleMax) * plotH,
  }));

  // Build smooth cubic bezier path
  let path;
  if (points.length === 1) {
    // Single point: draw a dot
    const p = points[0];
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}"/>
    </svg>`;
  } else if (points.length === 2) {
    path = `M ${points[0].x},${points[0].y} L ${points[1].x},${points[1].y}`;
  } else {
    // Catmull-Rom to cubic bezier for smooth curve
    path = `M ${points[0].x},${points[0].y}`;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(i - 1, 0)];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[Math.min(i + 2, points.length - 1)];

      const tension = 0.3;
      const cp1x = p1.x + (p2.x - p0.x) * tension;
      const cp1y = p1.y + (p2.y - p0.y) * tension;
      const cp2x = p2.x - (p3.x - p1.x) * tension;
      const cp2y = p2.y - (p3.y - p1.y) * tension;

      path += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
    }
  }

  // Build fill path (area under curve)
  const fillPath = path + ` L ${points[points.length - 1].x},${h - pad} L ${points[0].x},${h - pad} Z`;

  const strokeW = isBold ? 2 : 1.5;
  const opacity = isBold ? 0.15 : 0.12;

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="${fillPath}" fill="${color}" opacity="${opacity}"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>
    ${points.map((p, i) => {
      if (values[i] > 0) {
        return `<circle cx="${p.x}" cy="${p.y}" r="${isBold ? 2.5 : 2}" fill="${color}"/>`;
      }
      return '';
    }).join('')}
  </svg>`;
}

function renderGrid(shortName, data) {
  const table = document.getElementById(`grid_${shortName}`);
  const { weeks, billableJobs, nonBillableLabel, grid, jobTotals, weekTotals } = data;

  // Find the global max hours in any single cell for this designer (for consistent sparkline scaling)
  let globalMax = 0;
  for (const job of Object.keys(grid)) {
    for (const w of weeks) {
      if ((grid[job][w] || 0) > globalMax) globalMax = grid[job][w];
    }
  }
  // Also check weekly totals for the total row sparkline
  let totalMax = 0;
  for (const w of weeks) {
    if ((weekTotals[w] || 0) > totalMax) totalMax = weekTotals[w];
  }

  // Header
  const thead = document.createElement('thead');
  let headerRow = '<tr><th>Project</th>';
  for (const w of weeks) {
    headerRow += `<th>${formatWeekLabel(w)}</th>`;
  }
  headerRow += '<th class="total-col">Total</th>';
  headerRow += '<th class="spark-col">Trend</th></tr>';
  thead.innerHTML = headerRow;
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');

  // Billable rows
  let colorIdx = 0;
  for (const job of billableJobs) {
    const tr = document.createElement('tr');
    let html = `<td title="${job}">${job}</td>`;
    const values = [];
    for (const w of weeks) {
      const h = grid[job][w] || 0;
      values.push(h);
      if (h > 0) {
        html += `<td class="has-hours">${h % 1 === 0 ? h : h.toFixed(1)}</td>`;
      } else {
        html += `<td class="zero">–</td>`;
      }
    }
    const tot = jobTotals[job] || 0;
    html += `<td class="total-col">${tot % 1 === 0 ? tot : tot.toFixed(1)}</td>`;
    const sparkColor = CHART_COLORS[colorIdx % CHART_COLORS.length];
    html += `<td class="spark-cell">${buildSparkline(values, globalMax, sparkColor)}</td>`;
    tr.innerHTML = html;
    tbody.appendChild(tr);
    colorIdx++;
  }

  // Non-billable row
  const nbRow = document.createElement('tr');
  nbRow.className = 'nonbillable-row';
  let nbHtml = `<td>${nonBillableLabel}</td>`;
  const nbValues = [];
  for (const w of weeks) {
    const h = grid[nonBillableLabel][w] || 0;
    nbValues.push(h);
    if (h > 0) {
      nbHtml += `<td class="has-hours">${h % 1 === 0 ? h : h.toFixed(1)}</td>`;
    } else {
      nbHtml += `<td class="zero">–</td>`;
    }
  }
  const nbTot = jobTotals[nonBillableLabel] || 0;
  nbHtml += `<td class="total-col">${nbTot % 1 === 0 ? nbTot : nbTot.toFixed(1)}</td>`;
  nbHtml += `<td class="spark-cell">${buildSparkline(nbValues, globalMax, '#B7A9A3')}</td>`;
  nbRow.innerHTML = nbHtml;
  tbody.appendChild(nbRow);

  // Total row
  const totRow = document.createElement('tr');
  totRow.className = 'total-row';
  let totHtml = '<td>Total</td>';
  let grandTotal = 0;
  const totValues = [];
  for (const w of weeks) {
    const h = weekTotals[w] || 0;
    grandTotal += h;
    totValues.push(h);
    totHtml += `<td class="total-col">${h % 1 === 0 ? h : h.toFixed(1)}</td>`;
  }
  totHtml += `<td class="total-col">${grandTotal % 1 === 0 ? grandTotal : grandTotal.toFixed(1)}</td>`;
  totHtml += `<td class="spark-cell">${buildSparkline(totValues, totalMax, '#282828', true)}</td>`;
  totRow.innerHTML = totHtml;
  tbody.appendChild(totRow);

  table.appendChild(tbody);
}

function renderChart(canvasId, shortName, data) {
  const { weeks, billableJobs, nonBillableLabel, grid } = data;
  const labels = weeks.map(formatWeekLabel);

  const datasets = [];
  let colorIdx = 0;

  for (const job of billableJobs) {
    datasets.push({
      label: job,
      data: weeks.map(w => grid[job][w] || 0),
      backgroundColor: CHART_COLORS[colorIdx % CHART_COLORS.length],
      borderWidth: 0,
      borderRadius: 2,
    });
    colorIdx++;
  }

  // Non-billable as the last stack segment
  datasets.push({
    label: nonBillableLabel,
    data: weeks.map(w => grid[nonBillableLabel][w] || 0),
    backgroundColor: '#d4cfc5',
    borderWidth: 0,
    borderRadius: 2,
  });

  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            boxWidth: 12,
            padding: 12,
            font: { family: 'TT Norms Pro, sans-serif', size: 11 },
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y}h`,
            footer: (items) => {
              const total = items.reduce((s, i) => s + i.parsed.y, 0);
              return `Total: ${total}h`;
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          ticks: { font: { family: 'TT Norms Pro, sans-serif', size: 11 } },
          grid: { display: false },
        },
        y: {
          stacked: true,
          beginAtZero: true,
          title: { display: true, text: 'Hours', font: { family: 'TT Norms Pro, sans-serif', size: 12 } },
          ticks: { font: { family: 'JetBrains Mono, monospace', size: 11 } },
          grid: { color: '#E5E1D8' },
        }
      }
    }
  });
}

// --- Copy ---
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {}, () => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch {}
  document.body.removeChild(ta);
}

function copyAllGrids() {
  let tsv = '';

  for (const designer of DESIGNERS) {
    const data = buildDesignerData(designer);
    if (data.weeks.length === 0) continue;
    const shortName = SHORT_NAMES[designer];

    tsv += `${shortName}\n`;
    tsv += `Project\t${data.weeks.map(formatWeekLabel).join('\t')}\tTotal\n`;

    for (const job of data.billableJobs) {
      tsv += `${job}`;
      for (const w of data.weeks) {
        const h = data.grid[job][w] || 0;
        tsv += `\t${h || ''}`;
      }
      tsv += `\t${data.jobTotals[job] || ''}\n`;
    }

    // Non-billable
    tsv += `${data.nonBillableLabel}`;
    for (const w of data.weeks) {
      const h = data.grid[data.nonBillableLabel][w] || 0;
      tsv += `\t${h || ''}`;
    }
    tsv += `\t${data.jobTotals[data.nonBillableLabel] || ''}\n`;

    // Totals
    tsv += `Total`;
    let grand = 0;
    for (const w of data.weeks) {
      const h = data.weekTotals[w] || 0;
      grand += h;
      tsv += `\t${h}`;
    }
    tsv += `\t${grand}\n\n`;
  }

  copyToClipboard(tsv);
  showToast('All grids copied as TSV');
}

function clearHistory() {
  if (!confirm('Clear all stored timecard data? This cannot be undone.')) return;
  allEntries = [];
  loadedFiles = [];
  saveEntries();
  saveFileList();
  render();
  showToast('History cleared');
}

// --- File handling ---
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
  handleFiles(fileInput.files);
  fileInput.value = '';
});

function handleFiles(files) {
  let processedCount = 0;
  let newEntryCount = 0;

  for (const file of files) {
    if (loadedFiles.includes(file.name)) {
      showToast(`${file.name} already loaded — skipping`);
      continue;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const parsed = parseTimecardFile(wb);
        const newOnes = deduplicateEntries(allEntries, parsed);
        allEntries = allEntries.concat(newOnes);
        newEntryCount += newOnes.length;
        loadedFiles.push(file.name);

        processedCount++;
        if (processedCount === files.length) {
          saveEntries();
          saveFileList();
          render();
          showToast(`Added ${newEntryCount} entries from ${processedCount} file${processedCount > 1 ? 's' : ''}`);
        }
      } catch (err) {
        console.error('Parse error:', err);
        showToast(`Error parsing ${file.name}`);
        processedCount++;
      }
    };
    reader.readAsArrayBuffer(file);
  }

  if (processedCount === 0 && files.length > 0) {
    // All files were already loaded
  }
}

// Initial render (from localStorage)
render();
</script>
